<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Biology - Nutrition</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Biology</h1>
      <p>Nutrition<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Nutrition</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 60:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:3600,PASS:60}; // 60 minutes for 60 questions

// Section mapping - variable section sizes (12,14,9,10,9,6)
const SECTIONS={
  0:"A: Modes & Types of Nutrition",
  12:"B: Photosynthesis",
  26:"C: Mineral Nutrition in Plants",
  35:"D: Animal Nutrition - Food Classes",
  45:"E: Digestive System & Enzymes",
  54:"F: Integrated Applications"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 60 JAMB Biology Nutrition Questions
const QUIZ_DATA=[
  // Section A: Modes & Types of Nutrition (Questions 1-12)
  {q:"Which of the following organisms can synthesize its own food using chemical energy rather than light energy?",o:["Spirogyra","Nitrosomonas","Rhizopus","Euglena"],a:1,e:"Nitrosomonas is a nitrifying bacterium that performs chemosynthesis, using chemical energy from ammonia oxidation to produce food."},
  {q:"The mode of nutrition in which organisms feed on dead and decaying organic matter is known as:",o:["Parasitic nutrition","Saprophytic nutrition","Holozoic nutrition","Symbiotic nutrition"],a:1,e:"Saprophytic nutrition involves feeding on dead/decaying matter (e.g., Rhizopus, mushrooms). Parasitic involves living hosts; holozoic involves ingesting complex food."},
  {q:"Loranthus (mistletoe) is regarded as a partial parasite because it:",o:["Lives entirely on the host without photosynthesizing","Has green leaves but obtains water and minerals from the host plant","Feeds on dead organic matter attached to the host","Traps insects for nitrogen supplementation"],a:1,e:"Loranthus is a hemiparasite (partial parasite) with chlorophyll for photosynthesis but penetrates host xylem for water and minerals."},
  {q:"Which structure adaptation is common to all carnivorous plants?",o:["Presence of thorns for trapping prey","Modified leaves for trapping and digesting insects","Extensive root systems for nitrogen absorption","Bright flowers to attract insect prey"],a:1,e:"Carnivorous plants like sundew and bladderwort have modified leaves for trapping insects to supplement nitrogen in poor soils."},
  {q:"An organism that cannot synthesize its own food and depends on complex organic substances from other organisms exhibits:",o:["Autotrophic nutrition","Chemosynthesis","Heterotrophic nutrition","Photosynthesis"],a:2,e:"Heterotrophic nutrition involves dependence on other organisms for organic food; all animals, fungi, and most bacteria are heterotrophs."},
  {q:"Which of the following is NOT a characteristic of autotrophic organisms?",o:["They are producers in food chains","They convert light or chemical energy into chemical bonds","They depend on other organisms for carbon sources","They include green plants and some bacteria"],a:2,e:"Autotrophs are self-feeding and do NOT depend on others; they fix their own carbon from CO₂."},
  {q:"A student observed an organism growing on a decaying bread. The organism likely obtains nutrition through:",o:["Holozoic nutrition","Parasitic nutrition","Saprophytic nutrition","Photosynthesis"],a:2,e:"Bread mold (Rhizopus) is a saprophyte that secretes enzymes on dead matter and absorbs nutrients."},
  {q:"Which pair of organisms represents the correct match between nutrition mode and example?",o:["Autotrophic — Tapeworm","Heterotrophic — Algae","Chemosynthetic — Sulphur bacteria","Parasitic — Grass"],a:2,e:"Sulphur bacteria perform chemosynthesis. Tapeworm is heterotrophic, algae is autotrophic, grass is autotrophic."},
  {q:"The main difference between photosynthesis and chemosynthesis is the:",o:["End products formed","Source of energy used","Organisms that perform them","Presence of chlorophyll"],a:1,e:"Photosynthesis uses light energy; chemosynthesis uses chemical energy (both produce organic compounds)."},
  {q:"Which organism exhibits dual nutritional modes depending on environmental conditions?",o:["Plasmodium","Euglena","Mucor","Ascaris"],a:1,e:"Euglena is mixotrophic: photosynthetic in light (autotrophic) and saprophytic in darkness (heterotrophic)."},
  {q:"A plant that traps insects to supplement its nitrogen requirement grows characteristically in:",o:["Waterlogged soils with excess nitrogen","Acidic soils deficient in nitrates","Alkaline soils with high calcium","Sandy soils with adequate phosphorus"],a:1,e:"Carnivorous plants evolve in nitrogen-poor acidic habitats (bogs) where insect capture provides nitrogen."},
  {q:"Which of the following is a holozoic feeder?",o:["Mushroom","Green grass","Housefly larva","Lice"],a:2,e:"Housefly larva (maggot) ingests complex organic food. Mushroom is saprophytic, grass is autotrophic, lice is parasitic."},
  
  // Section B: Photosynthesis (Questions 13-26)
  {q:"The correct equation for photosynthesis is:",o:["C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + Energy","6CO₂ + 6H₂O + Light → C₆H₁₂O₆ + 6O₂","6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂ + Heat","C₆H₁₂O₆ → 2C₂H₅OH + 2CO₂"],a:1,e:"Photosynthesis converts CO₂ and water to glucose and oxygen using light energy. Option A is respiration; D is fermentation."},
  {q:"During the light reaction of photosynthesis, the photolysis of water results in the production of:",o:["ATP and NADPH only","Oxygen, electrons, and protons","Glucose and oxygen","Carbon dioxide and water"],a:1,e:"Water splitting (photolysis) yields O₂, electrons (e⁻), and protons (H⁺) used in electron transport chain."},
  {q:"The dark reaction (Calvin cycle) occurs in the:",o:["Thylakoid membranes of chloroplasts","Stroma of chloroplasts","Cristae of mitochondria","Cytoplasm of the cell"],a:1,e:"The stroma contains enzymes for CO₂ fixation and sugar synthesis; thylakoids house light reactions."},
  {q:"Which of the following is NOT a requirement for photosynthesis?",o:["Chlorophyll","Carbon (IV) oxide","Oxygen","Light energy"],a:2,e:"Oxygen is a PRODUCT of photosynthesis, not a requirement. The essential inputs are light, chlorophyll, CO₂, and water."},
  {q:"The primary function of NADP⁺ in photosynthesis is to:",o:["Split water molecules","Accept electrons and protons to form NADPH","Trap light energy","Fix carbon dioxide"],a:1,e:"NADP⁺ acts as an electron acceptor, becoming NADPH (reducing power) for the Calvin cycle."},
  {q:"A variegated leaf was tested for starch using iodine solution. Only the green parts turned blue-black because:",o:["Chlorophyll is necessary for starch production","The white parts contain more sugar","Iodine only reacts with green pigments","The green parts absorbed more iodine"],a:0,e:"This classic experiment proves chlorophyll is essential for photosynthesis/starch formation."},
  {q:"The energy transformation during photosynthesis is from:",o:["Chemical energy to light energy","Light energy to chemical energy","Heat energy to kinetic energy","Potential energy to electrical energy"],a:1,e:"Photosynthesis converts radiant (light) energy into chemical bond energy in glucose."},
  {q:"Which factor would NOT directly affect the rate of photosynthesis?",o:["Light intensity","Temperature","Oxygen concentration","Carbon dioxide concentration"],a:2,e:"Oxygen is a product; its concentration doesn't directly affect the rate (though very high O₂ can cause photorespiration)."},
  {q:"The oxygen released during photosynthesis comes from:",o:["Carbon dioxide","Glucose molecules","Water molecules","Atmospheric air"],a:2,e:"Isotope experiments (using H₂¹⁸O) proved the O₂ released originates from water photolysis, not CO₂."},
  {q:"In the light reaction, ATP is synthesized through:",o:["Oxidative phosphorylation","Photophosphorylation","Substrate-level phosphorylation","Glycolysis"],a:1,e:"Photophosphorylation uses light energy to add phosphate to ADP, forming ATP in chloroplasts."},
  {q:"The optimum temperature range for photosynthesis in most plants is:",o:["0°C – 10°C","15°C – 35°C","40°C – 50°C","60°C – 70°C"],a:1,e:"Enzymes in photosynthesis work optimally between 15-35°C; higher temperatures denature enzymes."},
  {q:"Which statement correctly distinguishes light and dark reactions?",o:["Light reactions produce glucose; dark reactions produce oxygen","Light reactions require light; dark reactions can occur in darkness","Light reactions occur in cytoplasm; dark reactions in nucleus","Light reactions fix CO₂; dark reactions produce ATP"],a:1,e:"Light reactions need light; dark reactions don't directly need light but use products (ATP, NADPH) from light reactions."},
  {q:"Destarching a plant before photosynthesis experiments is necessary to:",o:["Increase chlorophyll production","Remove previously stored starch for accurate results","Kill the plant cells","Soften the leaf for testing"],a:1,e:"Plants are kept in darkness (48 hours) to deplete starch stores, ensuring any starch detected is from the experiment."},
  {q:"Which gas is absorbed from the atmosphere during photosynthesis?",o:["Nitrogen","Oxygen","Carbon dioxide","Hydrogen"],a:2,e:"CO₂ enters through stomata and is fixed in the Calvin cycle to form carbohydrates."},
  
  // Section C: Mineral Nutrition in Plants (Questions 27-35)
  {q:"A plant showing yellowing between leaf veins while veins remain green is likely deficient in:",o:["Nitrogen","Phosphorus","Magnesium","Calcium"],a:2,e:"Interveinal chlorosis (yellowing between veins) is characteristic of magnesium deficiency (Mg is in chlorophyll)."},
  {q:"Which element is a component of chlorophyll but required only in trace amounts?",o:["Nitrogen","Magnesium","Iron","Manganese"],a:1,e:"Magnesium is the central atom in chlorophyll porphyrin ring; nitrogen is also present but needed in large amounts."},
  {q:"Stunted growth with purple discoloration on leaves indicates deficiency of:",o:["Potassium","Phosphorus","Nitrogen","Sulphur"],a:1,e:"Phosphorus deficiency causes purple anthocyanin accumulation and poor root development/energy transfer."},
  {q:"Which pair are both micronutrients (trace elements)?",o:["Nitrogen and phosphorus","Calcium and magnesium","Iron and zinc","Potassium and sulphur"],a:2,e:"Iron and zinc are needed in small quantities. N, P, K, Ca, Mg, S are macronutrients."},
  {q:"Nitrogen deficiency causes general yellowing because nitrogen is essential for:",o:["Cell wall formation","Chlorophyll and protein synthesis","Water regulation","Energy transfer"],a:1,e:"Nitrogen is a component of amino acids (proteins) and chlorophyll; deficiency causes chlorosis and stunted growth."},
  {q:"The death of root tips in a growing seedling may be caused by deficiency of:",o:["Calcium","Potassium","Boron","Molybdenum"],a:0,e:"Calcium is essential for cell wall formation and membrane stability; deficiency kills meristematic tissues (root tips)."},
  {q:"Which mineral deficiency would most severely affect enzyme activation and water regulation?",o:["Nitrogen","Phosphorus","Potassium","Iron"],a:2,e:"Potassium (K⁺) activates enzymes and regulates stomatal opening/closing for water balance."},
  {q:"A farmer notices leaf edges turning brown and stems becoming weak. This suggests deficiency of:",o:["Nitrogen","Phosphorus","Potassium","Magnesium"],a:2,e:"Potassium deficiency causes marginal leaf scorching (browning at edges) and weak stems/lodging."},
  {q:"Which element is required for nitrogen fixation in leguminous plants?",o:["Copper","Molybdenum","Zinc","Chlorine"],a:1,e:"Molybdenum is a cofactor for nitrogenase enzyme in root nodule bacteria that fix atmospheric N₂."},
  
  // Section D: Animal Nutrition - Food Classes (Questions 36-45)
  {q:"A child presenting with swollen abdomen, thin limbs, and flaky skin is suffering from:",o:["Marasmus","Kwashiorkor","Rickets","Scurvy"],a:1,e:"Kwashiorkor is protein deficiency with edema (swollen belly), retarded growth, and skin changes. Marasmus is general calorie deficiency (wasting)."},
  {q:"Which food test produces a violet or purple color indicating protein presence?",o:["Iodine test","Benedict's test","Biuret test","Emulsion test"],a:2,e:"Biuret test (NaOH + CuSO₄) detects peptide bonds, turning violet/purple. Iodine = starch; Benedict's = reducing sugar."},
  {q:"The deficiency disease caused by lack of vitamin C (ascorbic acid) is:",o:["Night blindness","Beriberi","Scurvy","Rickets"],a:2,e:"Vitamin C deficiency causes scurvy (bleeding gums, poor wound healing). Night blindness = Vitamin A; Beriberi = Vitamin B; Rickets = Vitamin D."},
  {q:"Which food substance is the most efficient for long-term energy storage?",o:["Carbohydrates","Proteins","Fats and oils","Vitamins"],a:2,e:"Fats yield 9 kcal/g (vs. 4 kcal/g for carbs/proteins) and are stored compactly as adipose tissue."},
  {q:"A positive Benedict's test result showing brick-red precipitate indicates the presence of:",o:["Starch","Reducing sugars","Proteins","Lipids"],a:1,e:"Benedict's solution (blue) turns brick-red when heated with reducing sugars (glucose, fructose, maltose)."},
  {q:"Which vitamin can be synthesized by the human body when exposed to sunlight?",o:["Vitamin A","Vitamin B","Vitamin C","Vitamin D"],a:3,e:"UV radiation converts 7-dehydrocholesterol in skin to vitamin D₃ (cholecalciferol)."},
  {q:"The translucent spot left on brown paper when oil is rubbed on it demonstrates:",o:["The emulsion test for fats","The oil spot test for lipids","The Biuret test for proteins","The iodine test for starch"],a:1,e:"The oil spot test (translucent stain on paper) is a simple qualitative test for lipids."},
  {q:"Which deficiency disease is associated with poor blood clotting?",o:["Vitamin A deficiency","Vitamin K deficiency","Vitamin E deficiency","Vitamin D deficiency"],a:1,e:"Vitamin K is essential for synthesis of prothrombin and clotting factors in the liver."},
  {q:"The end product of fat digestion that is NOT water-soluble is transported via:",o:["Blood capillaries to the liver","Lacteals to the lymphatic system","Hepatic portal vein directly","Bile duct to the gall bladder"],a:1,e:"Fatty acids and glycerol reform triglycerides in intestinal cells, enter lymphatic lacteals as chylomicrons, then join bloodstream."},
  {q:"Which food class provides essential amino acids that cannot be synthesized by the body?",o:["Carbohydrates","Proteins","Fats","Vitamins"],a:1,e:"Proteins provide 9 essential amino acids (histidine, isoleucine, leucine, lysine, methionine, phenylalanine, threonine, tryptophan, valine) that must be ingested."},
  
  // Section E: Digestive System & Enzymes (Questions 46-54)
  {q:"The hardest substance in the human body that covers and protects the tooth is:",o:["Dentine","Cementum","Enamel","Pulp"],a:2,e:"Enamel is 96% mineral (hydroxyapatite), harder than bone, protecting the tooth crown."},
  {q:"The dental formula I 2/2, C 1/1, P 2/2, M 3/3 represents:",o:["Adult human","Sheep","Dog","Rabbit"],a:0,e:"This is the human dental formula: 2 incisors, 1 canine, 2 premolars, 3 molars per quadrant = 32 teeth total."},
  {q:"In the sheep (herbivore), the dental formula lacks upper incisors and canines because:",o:["They have no teeth at all","A dental pad replaces them for grinding vegetation","They swallow food without chewing","Their canines grow continuously"],a:1,e:"Sheep have a horny dental pad on upper jaw against which lower incisors shear grass; formula: I 0/4, C 0/0, P 3/3, M 3/3."},
  {q:"Pepsin digests proteins in the stomach. Its optimum pH is:",o:["Highly alkaline (pH 8-9)","Neutral (pH 7)","Strongly acidic (pH 1.5-2)","Slightly acidic (pH 6)"],a:2,e:"Pepsin works optimally at pH 1.5-2 (gastric HCl environment); it becomes denatured in alkaline conditions."},
  {q:"Which enzyme acts on maltose to produce glucose?",o:["Sucrase","Lactase","Maltase","Amylase"],a:2,e:"Maltase hydrolyzes maltose (disaccharide) into two glucose molecules in the small intestine."},
  {q:"Bile produced by the liver is stored in the gall bladder and functions to:",o:["Digest proteins into amino acids","Emulsify fats for lipase action","Neutralize stomach acid completely","Activate pepsinogen to pepsin"],a:1,e:"Bile salts emulsify large fat droplets into smaller micelles, increasing surface area for pancreatic lipase."},
  {q:"The finger-like projections in the small intestine that increase surface area for absorption are called:",o:["Villi","Alveoli","Nephrons","Tracheae"],a:0,e:"Villi (and microvilli) massively increase intestinal surface area; each contains blood capillaries and a lacteal."},
  {q:"Trypsin is secreted by the pancreas and functions in the:",o:["Mouth to digest starch","Stomach to digest proteins","Small intestine to digest proteins","Large intestine to digest cellulose"],a:2,e:"Trypsin (activated from trypsinogen by enterokinase) continues protein digestion in the alkaline small intestine."},
  {q:"The process by which digested food molecules are used to build new body tissues is called:",o:["Ingestion","Digestion","Absorption","Assimilation"],a:3,e:"Assimilation is the incorporation of absorbed nutrients into body structures (e.g., amino acids → proteins, glucose → glycogen)."},
  
  // Section F: Integrated Applications (Questions 55-60)
  {q:"A patient has difficulty seeing in dim light (night blindness). Which food should be recommended?",o:["Citrus fruits","Carrots and liver","Whole grains","Dairy products"],a:1,e:"Vitamin A (retinol) from carrots (β-carotene) and liver prevents night blindness and maintains visual purple (rhodopsin)."},
  {q:"An experiment showed that a leaf exposed to light tested positive for starch, while a covered portion tested negative. This demonstrates that:",o:["Light is necessary for transpiration","Light is necessary for photosynthesis","Darkness increases respiration","Chlorophyll is produced in darkness"],a:1,e:"This is the classic starch test experiment proving light is essential for photosynthesis/starch production."},
  {q:"Which sequence correctly traces the path of food from ingestion to egestion?",o:["Mouth → Esophagus → Stomach → Small intestine → Large intestine → Rectum → Anus","Mouth → Stomach → Esophagus → Small intestine → Large intestine → Anus","Mouth → Small intestine → Stomach → Large intestine → Rectum → Anus","Mouth → Esophagus → Small intestine → Stomach → Large intestine → Anus"],a:0,e:"Correct alimentary canal sequence: ingestion → mechanical/chemical digestion → absorption → water absorption → storage → egestion."},
  {q:"A farmer applies nitrogen fertilizer to correct yellowing leaves. The expected outcome after 2 weeks would be:",o:["Purple discoloration of leaves","Restoration of green color and growth","Browning of leaf edges","Death of root tips"],a:1,e:"Nitrogen corrects chlorosis (yellowing) by enabling chlorophyll and protein synthesis, restoring green color."},
  {q:"In the mammalian tooth, the part containing nerves and blood vessels is the:",o:["Enamel","Dentine","Pulp cavity","Crown"],a:2,e:"The pulp cavity (in root and crown) contains connective tissue, blood vessels (nutrition), and nerves (sensation)."},
  {q:"Which combination of factors would MAXIMIZE the rate of photosynthesis in a greenhouse?",o:["Low light, low CO₂, high temperature","Optimal light, increased CO₂, optimal temperature","High light, low CO₂, high temperature","Darkness, high CO₂, low temperature"],a:1,e:"Photosynthesis is limited by whichever factor is scarcest (Liebig's Law). Optimal light + elevated CO₂ (often limiting) + suitable temperature maximizes rate."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('nutrition_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('nutrition_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/60`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('nutrition_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=38?'Good, review weak areas':pct>=30?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections - using actual section boundaries
  const sectionStarts=[0,12,26,35,45,54,60];
  const sectionNames=["A: Modes & Types of Nutrition","B: Photosynthesis","C: Mineral Nutrition in Plants","D: Animal Nutrition - Food Classes","E: Digestive System & Enzymes","F: Integrated Applications"];
  
  for(let s=0;s<6;s++){
    const start=sectionStarts[s];
    const end=sectionStarts[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('nutrition_quiz_auth');
  sessionStorage.removeItem('nutrition_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('nutrition_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('nutrition_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
