<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Biology - Excretion</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Biology</h1>
      <p>Excretion<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Excretion</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 60:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:3600,PASS:60}; // 60 minutes for 60 questions

// Section mapping - variable section sizes (25,20,15,10)
const SECTIONS={
  0:"A: Types of Excretory Structures",
  25:"B: Excretory Mechanisms",
  45:"C: Excretory Products of Plants",
  55:"D: General/Integrated Questions"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 60 JAMB Biology Excretion Questions
const QUIZ_DATA=[
  // Section A: Types of Excretory Structures (Questions 1-25)
  {q:"The contractile vacuole in Paramecium is primarily responsible for",o:["Digestion of food","Osmoregulation and excretion","Locomotion","Respiration"],a:1,e:"It expels excess water and waste to maintain osmotic balance in freshwater environments."},
  {q:"Which of the following organisms possesses a contractile vacuole?",o:["Tapeworm","Amoeba","Earthworm","Cockroach"],a:1,e:"Amoeba and Paramecium are unicellular organisms that use contractile vacuoles for osmoregulation."},
  {q:"The contractile vacuole fills with water and expels its contents through",o:["The nucleus","A permanent pore","The cell membrane","A temporary pore"],a:3,e:"It contracts rhythmically to force water out through a temporary pore in the cell membrane."},
  {q:"Flame cells are found in",o:["Roundworms","Flatworms","Annelids","Insects"],a:1,e:"Planaria and other flatworms (phylum Platyhelminthes) use flame cells as excretory structures."},
  {q:"The 'flame' appearance of flame cells is caused by",o:["Heat production","Rapid beating of cilia","Bioluminescence","Blood circulation"],a:1,e:"The tuft of cilia beats rapidly to create a flickering flame-like appearance under the microscope."},
  {q:"Flame cells are also known as",o:["Nephridia","Protonephridia","Metanephridia","Malpighian tubules"],a:1,e:"Protonephridia refers to the closed internal end of the tubule (no internal opening)."},
  {q:"Nephridia are the excretory organs of",o:["Flatworms","Roundworms","Annelids","Arthropods"],a:2,e:"Earthworms and other segmented worms use nephridia for excretion and osmoregulation."},
  {q:"The ciliated funnel of the nephridium is called",o:["Nephrostome","Nephridiopore","Coelomostome","Flame bulb"],a:0,e:"The nephrostome collects coelomic fluid and waste into the nephridial tubule."},
  {q:"Which type of nephridium opens to the exterior through the skin?",o:["Septal nephridium","Pharyngeal nephridium","Integumentary nephridium","Enteronephric nephridium"],a:2,e:"Integumentary nephridia open externally through the body wall/skin."},
  {q:"Septal nephridia in earthworms discharge their wastes into",o:["The exterior directly","The pharynx","The alimentary canal","The coelom"],a:2,e:"They are enteronephric, discharging into the intestine to conserve water."},
  {q:"Malpighian tubules are characteristic excretory organs of",o:["Mollusks","Arthropods","Echinoderms","Annelids"],a:1,e:"Insects, spiders, and other arthropods possess Malpighian tubules."},
  {q:"The main advantage of excreting uric acid in insects is",o:["Faster excretion","Water conservation","Energy production","Temperature regulation"],a:1,e:"Uric acid is insoluble and excreted as paste/crystals, minimizing water loss—crucial for terrestrial life."},
  {q:"Malpighian tubules empty their contents into",o:["The exterior directly","The hindgut","The hemocoel","The Malpighian body"],a:1,e:"They discharge nitrogenous wastes into the hindgut, where water is reabsorbed before feces/uric acid exit."},
  {q:"Which of the following is NOT a feature of Malpighian tubules?",o:["They are blind-ended","They are bathed in hemolymph","They filter blood under pressure","They transport wastes to the gut"],a:2,e:"They absorb wastes by diffusion from hemolymph, not by pressure filtration like kidneys."},
  {q:"The white substance in bird droppings represents",o:["Feces","Uric acid from Malpighian tubules","Undigested food","Eggs"],a:1,e:"Birds, like insects, convert nitrogenous waste to uric acid to conserve water."},
  {q:"The functional unit of the kidney is the",o:["Neuron","Nephron","Nephridium","Glomerulus"],a:1,e:"Each kidney contains about 1 million nephrons that perform filtration and urine formation."},
  {q:"Which part of the nephron is responsible for ultrafiltration?",o:["Proximal convoluted tubule","Loop of Henle","Renal corpuscle","Collecting duct"],a:2,e:"The glomerulus and Bowman's capsule together form the renal corpuscle where blood is filtered."},
  {q:"The Bowman's capsule is lined with",o:["Ciliated cells","Squamous epithelial cells","Columnar epithelial cells","Cuboidal epithelial cells"],a:1,e:"Simple squamous epithelium allows easy passage of filtrate from glomerular capillaries."},
  {q:"Which structure creates the osmotic gradient in the kidney medulla?",o:["Proximal tubule","Loop of Henle","Distal tubule","Collecting duct"],a:1,e:"The counter-current multiplier system in the loop of Henle concentrates urine."},
  {q:"The hormone ADH acts primarily on the",o:["Glomerulus","Proximal tubule","Distal tubule and collecting duct","Loop of Henle"],a:2,e:"ADH increases water permeability here, promoting water reabsorption and concentrated urine."},
  {q:"Which blood vessel carries blood away from the glomerulus?",o:["Afferent arteriole","Efferent arteriole","Renal artery","Renal vein"],a:1,e:"Afferent brings blood in; efferent carries it out (then forms peritubular capillaries)."},
  {q:"Glucose is completely reabsorbed in the",o:["Bowman's capsule","Proximal convoluted tubule","Loop of Henle","Collecting duct"],a:1,e:"Active transport reabsorbs 100% of glucose here under normal conditions."},
  {q:"Which of the following is NOT normally found in urine?",o:["Urea","Water","Glucose","Salts"],a:2,e:"Glucose appears in urine only when blood levels exceed renal threshold (diabetes)."},
  {q:"The renal pelvis connects the kidney to the",o:["Urethra","Ureter","Bladder","Blood vessels"],a:1,e:"Urine flows from pelvis → ureter → bladder → urethra."},
  {q:"Which adaptation allows marine fish to excrete excess salt?",o:["Long loops of Henle","Short loops of Henle","Absence of glomeruli","Large Malpighian tubules"],a:0,e:"Long loops enable production of concentrated urine to conserve water in salty environment."},
  
  // Section B: Excretory Mechanisms (Questions 26-45)
  {q:"The kidney performs all the following EXCEPT",o:["Regulation of blood pH","Production of erythropoietin","Digestion of proteins","Regulation of blood pressure"],a:2,e:"Kidneys filter blood and produce hormones but do not perform digestion."},
  {q:"The juxtaglomerular apparatus secretes",o:["Insulin","Renin","Thyroxine","Adrenaline"],a:1,e:"Renin activates the renin-angiotensin-aldosterone system to regulate blood pressure."},
  {q:"Which process in the nephron requires ATP?",o:["Ultrafiltration","Tubular reabsorption","Tubular secretion","Both B and C"],a:3,e:"Both reabsorption (glucose, amino acids) and secretion (H⁺, K⁺, drugs) use active transport."},
  {q:"The presence of protein in urine indicates damage to the",o:["Loop of Henle","Glomerular basement membrane","Collecting duct","Ureter"],a:1,e:"Large proteins should not pass through the glomerular filter; their presence suggests kidney disease."},
  {q:"Which condition results from kidney failure?",o:["Diabetes mellitus","Uremia","Anemia only","Hypertension only"],a:1,e:"Uremia (urea in blood) occurs when kidneys cannot filter nitrogenous wastes."},
  {q:"The lungs excrete",o:["Oxygen and carbon dioxide","Carbon dioxide and water vapor","Urea and ammonia","Bile pigments"],a:1,e:"CO₂ from cellular respiration and water vapor are removed via exhalation."},
  {q:"Which substance is removed by the lungs during detoxification of alcohol?",o:["Acetic acid","Ethanol vapor","Acetaldehyde","Ketones"],a:1,e:"About 2-10% of alcohol is excreted unchanged through lungs (detected in breathalyzer tests)."},
  {q:"The skin contributes to excretion through",o:["Sebaceous glands only","Sweat glands only","Both sebaceous and sweat glands","Hair follicles"],a:2,e:"Sweat removes water/salts/urea; sebaceous glands secrete sebum (oily waste)."},
  {q:"Which component of sweat indicates its excretory function?",o:["Water","Sodium chloride","Trace urea","All of the above"],a:3,e:"While thermoregulation is primary, all components represent metabolic waste removal."},
  {q:"The primary excretory product of the skin is",o:["Urea","Water and salts","Carbon dioxide","Bile pigments"],a:1,e:"Sweat is 99% water with NaCl; urea is present only in traces compared to urine."},
  {q:"Which statement about skin excretion is correct?",o:["It is the main excretory organ in humans","It removes more nitrogenous waste than kidneys","It plays a minor role in nitrogenous waste excretion","It produces concentrated urine"],a:2,e:"Skin removes minimal urea; kidneys handle 90%+ of nitrogenous waste excretion."},
  {q:"Goosebumps are caused by contractions of",o:["Sweat glands","Arrector pili muscles","Sebaceous glands","Blood vessels"],a:1,e:"These muscles raise hair to trap air for insulation (thermoregulation, not excretion)."},
  {q:"The characteristic odor of sweat is produced by",o:["Bacterial decomposition of sweat","Urea in sweat","Lactic acid","Sebum mixing with sweat"],a:0,e:"Fresh sweat is odorless; bacteria on skin break down components causing odor."},
  {q:"During heavy exercise, the skin excretes increased amounts of",o:["Glucose","Lactic acid","Insulin","Glycogen"],a:1,e:"Lactic acid from anaerobic respiration is partially removed through sweat."},
  {q:"Which condition increases sweat production?",o:["Hypothyroidism","Hyperthyroidism","Diabetes insipidus","Addison's disease"],a:1,e:"Hyperthyroidism increases metabolic rate and heat production, triggering more sweating."},
  {q:"Which gas is excreted by plants during photosynthesis?",o:["Carbon dioxide","Oxygen","Nitrogen","Methane"],a:1,e:"O₂ is released as byproduct when water is split during light reactions."},
  {q:"Plants excrete carbon dioxide during",o:["Photosynthesis only","Respiration only","Both photosynthesis and respiration","Neither process"],a:1,e:"CO₂ is produced in respiration (all the time) but used in photosynthesis (day only)."},
  {q:"Stomata open when guard cells",o:["Lose water and become flaccid","Gain water and become turgid","Die and collapse","Divide rapidly"],a:1,e:"Water uptake makes guard cells bow outward, creating the pore opening."},
  {q:"Lenticels are found on",o:["Leaves","Woody stems and roots","Flowers","Fruits only"],a:1,e:"They replace stomata for gas exchange when bark covers the stem surface."},
  {q:"Which plant product is used in tanning leather?",o:["Resins","Tannins","Gums","Mucilage"],a:1,e:"Tannins bind to proteins in animal hides, preserving and coloring leather."},
  
  // Section C: Excretory Products of Plants (Questions 46-55)
  {q:"Gums are economically important as",o:["Insecticides","Food thickeners and stabilizers","Fuels","Fertilizers"],a:1,e:"Arabic gum and others are used in foods, pharmaceuticals, and cosmetics."},
  {q:"Quinine, used to treat malaria, is obtained from",o:["Tannins","Alkaloids","Resins","Gums"],a:1,e:"Quinine is an alkaloid extracted from Cinchona tree bark."},
  {q:"Which plant excretory product is used as a laxative?",o:["Resins","Mucilage","Tannins","Essential oils"],a:1,e:"Mucilage (e.g., from psyllium seeds) absorbs water and promotes bowel movement."},
  {q:"Resins from conifers are used to make",o:["Food coloring","Varnishes and turpentine","Perfumes only","Alkaloid drugs"],a:1,e:"Resins are distilled to produce turpentine and processed into varnishes."},
  {q:"The medicinal value of alkaloids includes all EXCEPT",o:["Pain relief (morphine)","Malaria treatment (quinine)","Stimulation (caffeine)","Blood clotting (heparin)"],a:3,e:"Heparin is an animal-derived anticoagulant, not a plant alkaloid."},
  {q:"Oxygen produced by plants is economically important for",o:["Steel production only","Medical use and industrial processes","Fire extinguishers","Plastic manufacturing"],a:1,e:"Medical oxygen supports breathing; industrial oxygen is used in steel, rockets, etc."},
  {q:"Which statement about plant excretion is FALSE?",o:["Plants store waste products in vacuoles","Plants excrete nitrogenous waste like urea","Plants release CO₂ during respiration","Plants shed leaves to remove wastes"],a:1,e:"Plants recycle nitrogen compounds; they don't excrete urea like animals."},
  {q:"Abscission (leaf fall) helps plants excrete",o:["Only water","Accumulated mineral salts and wastes","Oxygen","Carbon dioxide"],a:1,e:"Leaves store metabolic wastes; shedding them removes these wastes from the plant."},
  {q:"Mucilage in plants functions to",o:["Attract pollinators","Protect seeds and store water","Produce toxins","Capture insects"],a:1,e:"It forms protective, water-retaining layers around seeds and in tissues."},
  {q:"Which combination is correct?",o:["Tannins—Adhesives","Resins—Leather tanning","Gums—Food thickeners","Alkaloids—Varnishes"],a:2,e:"Gums thicken foods; tannins tan leather; resins make varnishes; alkaloids are drugs."},
  
  // Section D: General/Integrated Questions (Questions 56-60)
  {q:"An organism living in freshwater must constantly pump out water because",o:["It drinks too much","Water enters by osmosis due to hypotonic environment","It produces excess urine","Its cells absorb salt"],a:1,e:"Freshwater is hypotonic to body fluids; water enters continuously, requiring active removal."},
  {q:"Which adaptation is common to desert animals and insects?",o:["Excretion of dilute urine","Excretion of uric acid","Presence of contractile vacuoles","Excretion through skin"],a:1,e:"Both convert nitrogenous waste to uric acid (paste/crystals) to minimize water loss."},
  {q:"A patient with kidney failure would show elevated blood levels of",o:["Glucose","Urea","Insulin","Oxygen"],a:1,e:"Uremia results when kidneys cannot filter urea from blood."},
  {q:"Which structure-function pair is INCORRECT?",o:["Flame cell—Flatworms","Nephridium—Earthworms","Malpighian tubule—Fishes","Kidney—Mammals"],a:2,e:"Malpighian tubules are in insects/arthropods, not fishes (which use kidneys)."},
  {q:"The economic importance of plant excretory products includes all EXCEPT",o:["Production of medicines","Manufacturing of leather goods","Generation of electricity","Food industry applications"],a:2,e:"While plant products have many uses, they are not used to generate electricity directly."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('excretion_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('excretion_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/60`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('excretion_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=38?'Good, review weak areas':pct>=30?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections - using actual section boundaries
  const sectionStarts=[0,25,45,55,60];
  const sectionNames=["A: Types of Excretory Structures","B: Excretory Mechanisms","C: Excretory Products of Plants","D: General/Integrated Questions"];
  
  for(let s=0;s<4;s++){
    const start=sectionStarts[s];
    const end=sectionStarts[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('excretion_quiz_auth');
  sessionStorage.removeItem('excretion_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('excretion_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('excretion_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
</body>
