<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Chemistry - Acids, Bases and Salts</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Chemistry</h1>
      <p>Acids, Bases and Salts<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Acids, Bases and Salts</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 70:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:4200,PASS:60}; // 70 minutes for 70 questions

// Section mapping
const SECTIONS={
  0:"A: Definitions and General Properties",
  10:"B: pH, pOH and Calculations",
  25:"C: Salts and Hydrolysis",
  40:"D: Titrations and Indicators",
  55:"E: Conductance and Buffer Solutions",
  65:"F: Mixed Concepts and Applications"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 70 JAMB Acids, Bases and Salts Questions
const QUIZ_DATA=[
  // Section A: Definitions and General Properties (1-10)
  {q:"According to the Brønsted-Lowry theory, an acid is defined as:",o:["A substance that produces OH⁻ ions in water","A proton donor","An electron pair acceptor","A substance that increases pH"],a:1,e:"Brønsted-Lowry defines acids as proton (H⁺) donors and bases as proton acceptors."},
  {q:"Which of the following is NOT a characteristic property of acids?",o:["Sour taste","Turn blue litmus red","Soapy feel","React with metals to produce hydrogen"],a:2,e:"Soapy/slippery feel is a property of bases, not acids."},
  {q:"The basicity of tetraoxosulphate(VI) acid is:",o:["1","2","3","4"],a:1,e:"H₂SO₄ has 2 replaceable hydrogen atoms, making it dibasic."},
  {q:"Which acid is monobasic?",o:["H₂SO₄","H₃PO₄","HNO₃","H₂CO₃"],a:2,e:"HNO₃ has only 1 replaceable hydrogen atom."},
  {q:"Citric acid is classified as:",o:["An inorganic acid","A mineral acid","An organic acid","A strong acid"],a:2,e:"Citric acid occurs naturally in citrus fruits, making it an organic acid."},
  {q:"Which property is common to both strong acids and strong bases?",o:["High electrical conductivity","Sour taste","Soapy feel","Low pH values"],a:0,e:"Both strong acids and strong bases are strong electrolytes with high electrical conductivity due to complete dissociation."},
  {q:"An acid-base indicator is a substance which:",o:["Changes color at the end point","Changes color according to pH","Neutralizes acids and bases","Indicates the amount of acid present"],a:1,e:"Indicators change color depending on the pH of the solution."},
  {q:"Which of the following acids is NOT naturally occurring?",o:["Ethanoic acid","Citric acid","Tartaric acid","Hydrochloric acid"],a:3,e:"HCl is a mineral acid prepared in the laboratory, not found naturally."},
  {q:"The conjugate base of H₂SO₄ is:",o:["SO₄²⁻","HSO₄⁻","H₃SO₄⁺","OH⁻"],a:1,e:"When H₂SO₄ donates one proton, it forms HSO₄⁻ (hydrogen sulphate ion)."},
  {q:"Which oxide will react with both acids and bases?",o:["CO₂","CaO","ZnO","SO₂"],a:2,e:"ZnO is amphoteric - it reacts with both acids and bases."},
  
  // Section B: pH, pOH and Calculations (11-25)
  {q:"Calculate the pH of a 0.001M solution of HCl.",o:["1","2","3","4"],a:2,e:"pH = -log(0.001) = -log(10⁻³) = 3."},
  {q:"The pH of a solution is 5. What is the [H⁺] concentration?",o:["10⁻⁵ mol/dm³","10⁵ mol/dm³","5 × 10⁻¹ mol/dm³","5 mol/dm³"],a:0,e:"[H⁺] = 10^(-pH) = 10⁻⁵ mol/dm³."},
  {q:"Calculate the pOH of a 0.01M NaOH solution.",o:["2","12","14","1"],a:0,e:"pOH = -log(0.01) = -log(10⁻²) = 2."},
  {q:"If the pH of a solution is 9, the pOH is:",o:["9","5","7","14"],a:1,e:"pH + pOH = 14, so pOH = 14 - 9 = 5."},
  {q:"The [H⁺] in a solution with pH 4 is:",o:["4 × 10⁻¹ mol/dm³","1 × 10⁻⁴ mol/dm³","4 × 10⁻⁴ mol/dm³","1 × 10⁴ mol/dm³"],a:1,e:"[H⁺] = 10^(-4) = 1 × 10⁻⁴ mol/dm³."},
  {q:"Calculate the pH of 0.005M H₂SO₄.",o:["2.0","2.3","3.0","1.0"],a:0,e:"[H⁺] = 2 × 0.005 = 0.01 = 10⁻² M. pH = -log(10⁻²) = 2.0."},
  {q:"What is the pH of a 0.0005M Ca(OH)₂ solution?",o:["10.0","11.0","3.0","11.3"],a:1,e:"[OH⁻] = 2 × 0.0005 = 0.001 = 10⁻³ M. pOH = 3, so pH = 14 - 3 = 11.0."},
  {q:"If [OH⁻] = 2.5 × 10⁻⁴ M, calculate the pH.",o:["3.6","10.4","4.0","10.0"],a:1,e:"pOH = -log(2.5 × 10⁻⁴) = 3.6. pH = 14 - 3.6 = 10.4."},
  {q:"The hydrogen ion concentration of a solution is 3.0 × 10⁻⁶ M. What is the pH?",o:["5.52","6.00","5.00","6.52"],a:0,e:"pH = -log(3.0 × 10⁻⁶) = 6 - log(3) = 6 - 0.48 = 5.52."},
  {q:"A solution has a pH of 2.5. What is [H⁺]?",o:["3.16 × 10⁻³ M","2.5 × 10⁻² M","5.0 × 10⁻³ M","1.0 × 10⁻²·⁵ M"],a:0,e:"[H⁺] = 10^(-2.5) = 10^(-3) × 10^(0.5) = 3.16 × 10⁻³ M."},
  {q:"Which solution has the highest pH?",o:["0.1M HCl","0.1M CH₃COOH","0.1M NaOH","0.1M NaCl"],a:2,e:"NaOH is a strong base with pH around 13, much higher than the others."},
  {q:"The pH range of a neutral solution at 25°C is:",o:["Exactly 7","6.5 - 7.5","0 - 7","7 - 14"],a:0,e:"A truly neutral solution has pH exactly 7 at 25°C."},
  {q:"Calculate the pH when 50cm³ of 0.1M HCl is mixed with 50cm³ of 0.05M NaOH.",o:["1.0","1.3","1.6","2.0"],a:2,e:"Excess H⁺ = (0.005 - 0.0025) = 0.0025 mol in 100cm³. [H⁺] = 0.025 M. pH = -log(0.025) = 1.60."},
  {q:"What is the [OH⁻] in a solution with pH 10?",o:["10⁻¹⁰ M","10⁻⁴ M","10⁴ M","10⁻¹⁴ M"],a:1,e:"pOH = 14 - 10 = 4. [OH⁻] = 10⁻⁴ M."},
  {q:"The pKa of an acid is 4.76. What is its Ka?",o:["1.74 × 10⁻⁵","4.76 × 10⁻¹","1.0 × 10⁻⁴·⁷⁶","5.24 × 10⁻¹⁰"],a:0,e:"Ka = 10^(-pKa) = 10^(-4.76) = 1.74 × 10⁻⁵."},
  
  // Section C: Salts and Hydrolysis (26-40)
  {q:"Which salt will produce an acidic solution when dissolved in water?",o:["NaCl","CH₃COONa","NH₄Cl","K₂SO₄"],a:2,e:"NH₄Cl is a salt of strong acid and weak base. NH₄⁺ hydrolyzes to produce H₃O⁺."},
  {q:"The hydrolysis of CH₃COONa in water produces:",o:["Acidic solution","Basic solution","Neutral solution","No change"],a:1,e:"CH₃COO⁻ (conjugate base of weak acid) hydrolyzes to produce OH⁻ ions."},
  {q:"Which equation represents the hydrolysis of NH₄⁺?",o:["NH₄⁺ + OH⁻ → NH₃ + H₂O","NH₄⁺ + H₂O → NH₃ + H₃O⁺","NH₃ + H₂O → NH₄⁺ + OH⁻","NH₄⁺ → NH₃ + H⁺"],a:1,e:"NH₄⁺ donates a proton to water, forming NH₃ and H₃O⁺."},
  {q:"Na₂CO₃ solution is basic because:",o:["Na⁺ reacts with water","CO₃²⁻ hydrolyzes to produce OH⁻","It contains excess NaOH","CO₃²⁻ is a strong base"],a:1,e:"CO₃²⁻ + H₂O → HCO₃⁻ + OH⁻. The carbonate ion hydrolyzes to produce hydroxide ions."},
  {q:"AlCl₃ solution is acidic due to:",o:["Cl⁻ hydrolysis","Al³⁺ polarizing water molecules","Formation of Al(OH)₃","Presence of excess HCl"],a:1,e:"Small, highly charged Al³⁺ polarizes water molecules, causing release of H⁺."},
  {q:"Which salt will have pH = 7 in aqueous solution?",o:["NH₄NO₃","Na₂CO₃","KCl","FeCl₃"],a:2,e:"KCl is a salt of strong acid (HCl) and strong base (KOH). Neither ion hydrolyzes."},
  {q:"The pH of 0.1M CH₃COONa solution will be:",o:["Less than 7","Equal to 7","Greater than 7","Equal to 0"],a:2,e:"Salt of weak acid and strong base produces basic solution (pH > 7)."},
  {q:"Which is a double salt?",o:["Na₂SO₄","KAl(SO₄)₂·12H₂O","NaHSO₄","CuSO₄·5H₂O"],a:1,e:"Potash alum KAl(SO₄)₂·12H₂O is a classic example of a double salt."},
  {q:"An acidic salt is formed when:",o:["Strong acid reacts with strong base","Strong acid reacts with weak base","Weak acid reacts with strong base","Weak acid reacts with weak base"],a:1,e:"Partial neutralization of strong acid by weak base yields acidic salt (e.g., NH₄Cl)."},
  {q:"The hydrolysis of CO₃²⁻ can be represented as:",o:["CO₃²⁻ + 2H₂O → H₂CO₃ + 2OH⁻","CO₃²⁻ + H₂O → HCO₃⁻ + OH⁻","CO₃²⁻ + H₃O⁺ → HCO₃⁻ + H₂O","CO₃²⁻ → CO₂ + O²⁻"],a:1,e:"First step of carbonate hydrolysis produces bicarbonate and hydroxide ions."},
  {q:"Which salt is basic?",o:["NaHSO₄","Mg(OH)Cl","K₂SO₄","NH₄Cl"],a:1,e:"Basic salts contain replaceable hydroxide groups, like Mg(OH)Cl."},
  {q:"The salt formed from the reaction between HNO₃ and NH₃ is:",o:["Acidic","Basic","Neutral","Amphoteric"],a:0,e:"NH₄NO₃ is a salt of strong acid and weak base, therefore acidic."},
  {q:"Which ion does NOT undergo hydrolysis?",o:["NH₄⁺","CH₃COO⁻","Na⁺","CO₃²⁻"],a:2,e:"Na⁺ is a spectator ion from strong base NaOH and does not hydrolyze."},
  {q:"The pH of Al₂(SO₄)₃ solution is:",o:["Equal to 7","Less than 7","Greater than 7","Equal to 0"],a:1,e:"Al³⁺ hydrolyzes to produce acidic solution (similar to AlCl₃)."},
  {q:"A solution of NaHCO₃ is:",o:["Strongly acidic","Weakly acidic","Neutral","Weakly basic"],a:3,e:"HCO₃⁻ can act as both acid and base, but its hydrolysis to produce OH⁻ is slightly more significant than dissociation."},
  
  // Section D: Titrations and Indicators (41-55)
  {q:"25.0cm³ of 0.1M NaOH requires 20.0cm³ of H₂SO₄ for neutralization. What is the concentration of the acid?",o:["0.0625 M","0.125 M","0.25 M","0.05 M"],a:0,e:"Using n_A C_A V_A = n_B C_B V_B: 2 × C_A × 20 = 1 × 0.1 × 25. C_A = 0.0625 M."},
  {q:"Which indicator is suitable for titrating ethanoic acid against sodium hydroxide?",o:["Methyl orange","Methyl red","Phenolphthalein","Litmus"],a:2,e:"Weak acid + strong base gives equivalence point pH > 7. Phenolphthalein (pH 8.3-10) is suitable."},
  {q:"20.0cm³ of 0.5M HCl neutralizes 25.0cm³ of Na₂CO₃ solution. What is the concentration of Na₂CO₃?",o:["0.2 M","0.25 M","0.4 M","0.1 M"],a:0,e:"2HCl + Na₂CO₃ → 2NaCl + H₂O + CO₂. Using stoichiometry: C_B = (0.5 × 20)/(2 × 25) = 0.2 M."},
  {q:"The equivalence point of strong acid vs weak base titration occurs at pH:",o:["7","Less than 7","Greater than 7","14"],a:1,e:"Strong acid + weak base produces acidic salt. Equivalence point pH < 7."},
  {q:"Calculate the volume of 0.1M HCl needed to neutralize 25cm³ of 0.2M NaOH.",o:["25 cm³","50 cm³","12.5 cm³","100 cm³"],a:1,e:"C_A V_A = C_B V_B. 0.1 × V_A = 0.2 × 25. V_A = 50 cm³."},
  {q:"Which titration combination requires methyl orange as indicator?",o:["HCl vs NaOH","CH₃COOH vs NaOH","HCl vs NH₃","H₂SO₄ vs KOH"],a:2,e:"Strong acid + weak base (HCl + NH₃) has equivalence point pH < 7. Methyl orange (pH 3.1-4.4) is suitable."},
  {q:"22.5cm³ of 0.1M KOH neutralizes 25.0cm³ of HNO₃. What is the concentration of the acid?",o:["0.09 M","0.1125 M","0.225 M","0.045 M"],a:0,e:"C_A × 25 = 0.1 × 22.5. C_A = 2.25/25 = 0.09 M."},
  {q:"In a titration, the end point is reached when:",o:["The indicator changes color","Equal volumes of acid and base are mixed","pH reaches exactly 7","The solution becomes neutral"],a:0,e:"The end point is the point where the indicator changes color, which should coincide with the equivalence point."},
  {q:"25.0cm³ of 0.08M NaOH requires 20.0cm³ of H₂SO₄ for complete neutralization. What is the concentration of the acid?",o:["0.05 M","0.08 M","0.04 M","0.10 M"],a:0,e:"2 × C_A × 20 = 1 × 0.08 × 25. 40 C_A = 2. C_A = 0.05 M."},
  {q:"Which statement about titration curves is correct?",o:["Strong acid vs strong base curve is vertical at pH 7","Weak acid vs strong base starts at very low pH","Strong acid vs weak base equivalence point is above 7","All titration curves have the same shape"],a:0,e:"Strong acid + strong base titration has steep vertical portion centered at pH 7."},
  {q:"Calculate the mass of NaOH in 500cm³ of 0.2M solution. (Na=23, O=16, H=1)",o:["2.0 g","4.0 g","8.0 g","0.4 g"],a:1,e:"Molar mass NaOH = 40 g/mol. Mass = 0.2 × 0.5 × 40 = 4.0 g."},
  {q:"What volume of 0.5M H₂SO₄ is needed to neutralize 20cm³ of 0.2M NaOH?",o:["4 cm³","8 cm³","2 cm³","16 cm³"],a:0,e:"2 × 0.5 × V_A = 1 × 0.2 × 20. V_A = 4/2 = 4 cm³."},
  {q:"The pH at the equivalence point of weak acid vs strong base titration is:",o:["Exactly 7","Less than 7","Greater than 7","Zero"],a:2,e:"The salt formed (e.g., CH₃COONa) hydrolyzes to produce OH⁻, making pH > 7."},
  {q:"Which mistake would give a titre value that is too high?",o:["Rinsing burette with water before adding acid","Reading meniscus at eye level","Adding indicator before starting","Using pipette rinsed with water only"],a:0,e:"Water in burette dilutes acid, requiring more volume to neutralize base, giving falsely high titre."},
  {q:"1.06g of pure Na₂CO₃ was dissolved in 250cm³. 25cm³ of this solution required 20cm³ of HCl for neutralization. What is the concentration of HCl?",o:["0.05 M","0.10 M","0.20 M","0.25 M"],a:1,e:"Moles Na₂CO₃ = 1.06/106 = 0.01 mol. Concentration = 0.01 × (1000/250) = 0.04 M. In 25cm³: moles = 0.001. HCl moles needed = 0.002. C_HCl = 0.002/0.020 = 0.10 M."},
  
  // Section E: Conductance and Buffer Solutions (56-65)
  {q:"Which solution has the highest electrical conductivity at the same concentration?",o:["0.1M CH₃COOH","0.1M HCl","0.1M NH₃","0.1M C₆H₁₂O₆"],a:1,e:"HCl is a strong acid and completely dissociates, producing the highest ion concentration."},
  {q:"The relationship between conductance and degree of dissociation is:",o:["Inverse","Direct","No relationship","Exponential"],a:1,e:"Higher degree of dissociation means more ions, hence higher conductance."},
  {q:"Which is NOT a characteristic of a buffer solution?",o:["Resists pH change","Contains weak acid and its salt","Has fixed pH forever","Maintains pH upon dilution"],a:2,e:"Buffers resist pH change but can be overwhelmed by large amounts of acid/base."},
  {q:"A buffer solution can be prepared by mixing:",o:["HCl and NaCl","CH₃COOH and CH₃COONa","NaOH and NaCl","H₂SO₄ and Na₂SO₄"],a:1,e:"A weak acid and its conjugate base salt (or weak base and its salt) forms a buffer."},
  {q:"The pH of a buffer solution depends on:",o:["The concentration of the salt only","The ratio of salt to acid concentration","The volume of the solution","The temperature only"],a:1,e:"From Henderson-Hasselbalch equation: pH = pKa + log([salt]/[acid])."},
  {q:"Which has the lowest electrical conductivity?",o:["1M HCl","1M NaOH","1M CH₃COOH","1M NaCl"],a:2,e:"CH₃COOH is a weak acid with low degree of dissociation, hence few ions and low conductivity."},
  {q:"The buffer system in human blood is:",o:["CH₃COOH/CH₃COONa","NH₃/NH₄Cl","H₂CO₃/NaHCO₃","H₃PO₄/NaH₂PO₄"],a:2,e:"Carbonic acid/bicarbonate buffer maintains blood pH at 7.4."},
  {q:"When a small amount of acid is added to a buffer solution:",o:["pH decreases drastically","pH increases slightly","pH remains approximately constant","Buffer is destroyed"],a:2,e:"The basic component of the buffer neutralizes added acid, maintaining pH."},
  {q:"The degree of dissociation of a weak electrolyte increases with:",o:["Decrease in concentration","Increase in concentration","Addition of common ion","Decrease in temperature"],a:0,e:"Dilution (decrease in concentration) shifts equilibrium toward more dissociation (Ostwald's dilution law)."},
  {q:"Which pair forms a basic buffer?",o:["NH₃ and NH₄Cl","HCl and NaCl","CH₃COOH and CH₃COONa","NaOH and NaCl"],a:0,e:"Weak base (NH₃) and its salt (NH₄Cl) forms a basic buffer."},
  
  // Section F: Mixed Concepts and Applications (66-70)
  {q:"Which substance is amphoteric?",o:["Al₂O₃","CO₂","CaO","SO₂"],a:0,e:"Al₂O₃ reacts with both acids (forming Al³⁺ salts) and bases (forming aluminate ions)."},
  {q:"The main component of baking powder that causes dough to rise is:",o:["Na₂CO₃","NaHCO₃","NH₄Cl","CaCO₃"],a:1,e:"Sodium hydrogen carbonate (NaHCO₃) decomposes when heated to produce CO₂ gas."},
  {q:"Which gas is liberated when dilute HCl reacts with iron filings?",o:["Chlorine","Hydrogen","Oxygen","Carbon dioxide"],a:1,e:"Fe + 2HCl → FeCl₂ + H₂↑. Active metals displace hydrogen from acids."},
  {q:"Efflorescence is a phenomenon shown by:",o:["Anhydrous salts","Hydrated salts that lose water","Salts that absorb water","Deliquescent substances"],a:1,e:"Efflorescent salts (like Na₂CO₃·10H₂O) lose water of crystallization to the atmosphere."},
  {q:"Which statement about acids is FALSE?",o:["All acids contain hydrogen","All acids are corrosive","All acids ionize in water","All acids have pH less than 7"],a:1,e:"While many acids are corrosive, some weak acids like citric acid in foods are not considered corrosive in normal use."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('acids_bases_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('acids_bases_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/70`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('acids_bases_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=63?'Ready for JAMB!':pct>=53?'Good, review weak areas':pct>=42?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,10,25,40,55,65,70];
  const sectionNames=["A: Definitions and General Properties","B: pH, pOH and Calculations","C: Salts and Hydrolysis","D: Titrations and Indicators","E: Conductance and Buffer Solutions","F: Mixed Concepts and Applications"];
  
  for(let s=0;s<6;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`
        <h4>Question ${i+1}</h4>
        <div class="q-text">${q.q}</div>
        <div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div>
        <div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div>
        <div class="exp">${q.e}</div>
      `;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('acids_bases_quiz_auth');
  sessionStorage.removeItem('acids_bases_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('acids_bases_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('acids_bases_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
