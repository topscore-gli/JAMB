<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Chemistry - Kinetic Theory & Gas Laws</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Chemistry</h1>
      <p>Kinetic Theory of Matter & Gas Laws<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Kinetic Theory & Gas Laws</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 65:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:3900,PASS:60}; // 65 minutes for 65 questions

// Section mapping
const SECTIONS={
  0:"A: Kinetic Theory & States of Matter",
  15:"B: Boyle's Law",
  25:"C: Charles's Law",
  35:"D: Pressure Law & Combined Gas Law",
  45:"E: Ideal Gas Equation & Molar Volume",
  52:"F: Graham's Law & Vapour Density",
  60:"Bonus: Dalton's Law & Atomicity"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 65 JAMB Chemistry Questions
const QUIZ_DATA=[
  // Section A: Kinetic Theory & States of Matter (1-15)
  {q:"Which phenomenon provides direct evidence for the kinetic theory of matter?",o:["Diffusion","Brownian motion","Osmosis","Photosynthesis"],a:1,e:"Brownian motion shows random particle movement caused by molecular collisions, proving matter consists of tiny moving particles."},
  {q:"The change of state from solid to liquid is called:",o:["Vaporization","Condensation","Melting","Sublimation"],a:2,e:"Melting occurs when particles gain enough energy to break free from fixed positions but remain close together."},
  {q:"During boiling, the temperature of a liquid remains constant because:",o:["Heat is lost to the surroundings","Heat energy is used to overcome intermolecular forces","The heater is turned off","Evaporation stops"],a:1,e:"Latent heat of vaporization overcomes intermolecular bonds; kinetic energy (temperature) stays constant."},
  {q:"The random motion of smoke particles in air is an example of:",o:["Diffusion","Brownian motion","Osmosis","Effusion"],a:1,e:"Smoke particles show zigzag motion due to unequal bombardment by invisible air molecules."},
  {q:"Which factor increases Brownian motion?",o:["Increasing particle size","Decreasing temperature","Increasing fluid viscosity","Decreasing particle size"],a:3,e:"Smaller particles are more easily moved by molecular collisions, showing more obvious motion."},
  {q:"Evaporation causes cooling because:",o:["Fast-moving particles escape, leaving slower ones","Air rushes in to replace vapor","Heat is absorbed from the sun","The liquid expands"],a:0,e:"High-energy surface particles escape; remaining particles have lower average kinetic energy."},
  {q:"The process by which a solid changes directly to gas is:",o:["Condensation","Deposition","Sublimation","Vaporization"],a:2,e:"Sublimation (e.g., iodine, dry ice) bypasses the liquid phase entirely."},
  {q:"Which statement about solids is correct?",o:["Particles are far apart and move randomly","Particles vibrate about fixed positions","Particles slide past each other","Particles have no definite shape"],a:1,e:"Solid particles vibrate in fixed lattice positions; strong forces maintain definite shape."},
  {q:"At the melting point of ice:",o:["All molecules stop moving","Kinetic energy increases while potential energy stays constant","Temperature remains constant while energy breaks bonds","The ice expands suddenly"],a:2,e:"Temperature stays at 0°C; latent heat breaks hydrogen bonds between water molecules."},
  {q:"The gaseous state is characterized by:",o:["Strong intermolecular forces","Fixed volume and shape","Negligible intermolecular forces and random motion","Particles in fixed positions"],a:2,e:"Gas particles move freely with negligible attraction between them."},
  {q:"Condensation occurs when:",o:["Gas molecules gain kinetic energy","Gas molecules lose kinetic energy and forces pull them together","Liquid molecules turn to solid","Pressure on gas decreases"],a:1,e:"Cooling reduces motion; intermolecular forces become significant enough to form liquid."},
  {q:"Which state of matter has the highest entropy?",o:["Solid","Liquid","Gas","All have equal entropy"],a:2,e:"Gas has maximum disorder/randomness due to free particle movement."},
  {q:"The temperature at which solid and liquid coexist in equilibrium is called:",o:["Boiling point","Melting point","Triple point","Critical temperature"],a:1,e:"At melting point, solid and liquid phases are in dynamic equilibrium."},
  {q:"Why does increasing temperature increase the rate of diffusion?",o:["Particles become heavier","Particles move faster with more kinetic energy","Intermolecular forces increase","Particle size decreases"],a:1,e:"Higher temperature = higher average kinetic energy = faster random motion."},
  {q:"The phenomenon where water droplets form on a cold glass surface is:",o:["Boiling","Evaporation","Condensation","Melting"],a:2,e:"Water vapor in air loses energy on contact with cold surface, forming liquid droplets."},
  
  // Section B: Boyle's Law (16-25)
  {q:"Boyle's law states that at constant temperature:",o:["Pressure is directly proportional to volume","Pressure is inversely proportional to volume","Volume is directly proportional to temperature","Pressure is directly proportional to temperature"],a:1,e:"P ∝ 1/V or PV = k at constant temperature."},
  {q:"A gas occupies 400 cm³ at 800 mmHg. What is its volume at 400 mmHg (constant T)?",o:["200 cm³","400 cm³","800 cm³","1600 cm³"],a:2,e:"P₁V₁ = P₂V₂ → 800 × 400 = 400 × V₂ → V₂ = 800 cm³"},
  {q:"A graph of pressure against volume for a gas at constant temperature is:",o:["A straight line through origin","A hyperbola","A straight line with negative slope","A parabola"],a:1,e:"P vs V produces a hyperbolic curve (inverse relationship)."},
  {q:"A graph of pressure against 1/volume at constant temperature is:",o:["A curve","A horizontal line","A straight line through the origin","A vertical line"],a:2,e:"Since P ∝ 1/V, the plot is linear through origin."},
  {q:"A gas is compressed from 600 cm³ to 300 cm³ at constant temperature. If the initial pressure was 1 atm, the final pressure is:",o:["0.5 atm","1 atm","2 atm","3 atm"],a:2,e:"1 × 600 = P₂ × 300 → P₂ = 2 atm (halving volume doubles pressure)"},
  {q:"Which of these graphs does NOT represent Boyle's law?",o:["P vs V (hyperbola)","P vs 1/V (straight line)","PV vs P (horizontal line)","V vs T (straight line)"],a:3,e:"V vs T represents Charles's law, not Boyle's law."},
  {q:"A balloon contains 2 dm³ of gas at 1 atm. What volume will it occupy at 4 atm (constant T)?",o:["0.25 dm³","0.5 dm³","8 dm³","2 dm³"],a:1,e:"1 × 2 = 4 × V₂ → V₂ = 0.5 dm³"},
  {q:"Boyle's law is obeyed by:",o:["Ideal gases only","Real gases at high pressure and low temperature","All gases under all conditions","Solids and liquids"],a:0,e:"Real gases approximate Boyle's law at low pressure, high temperature; ideal gases obey it perfectly."},
  {q:"The product PV for an ideal gas at constant temperature is:",o:["Zero","Constant","Directly proportional to P","Inversely proportional to V"],a:1,e:"PV = k (constant) at constant temperature."},
  {q:"A gas cylinder has volume 10 dm³ at 5 atm. If opened to atmosphere (1 atm) at same temperature, what volume would the gas occupy?",o:["2 dm³","10 dm³","50 dm³","100 dm³"],a:2,e:"5 × 10 = 1 × V₂ → V₂ = 50 dm³"},
  
  // Section C: Charles's Law (26-35)
  {q:"Charles's law states that at constant pressure:",o:["Volume is inversely proportional to temperature","Volume is directly proportional to absolute temperature","Pressure is directly proportional to temperature","Volume is constant"],a:1,e:"V ∝ T (Kelvin) at constant pressure: V₁/T₁ = V₂/T₂"},
  {q:"A gas occupies 300 cm³ at 27°C. What is its volume at 54°C (constant P)?",o:["150 cm³","327 cm³","600 cm³","3270 cm³"],a:1,e:"T₁ = 300 K, T₂ = 327 K → 300/300 = V₂/327 → V₂ = 327 cm³"},
  {q:"To what temperature must a gas at 300 K be heated to double its volume at constant pressure?",o:["150 K","450 K","600 K","1500 K"],a:2,e:"V ∝ T; doubling volume requires doubling absolute temperature: 300 × 2 = 600 K"},
  {q:"The absolute zero of temperature is:",o:["0°C","-100°C","-273°C","-373°C"],a:2,e:"0 K = -273°C; theoretical temperature where molecular motion ceases."},
  {q:"A graph of volume vs temperature (°C) for a gas extrapolates to zero volume at:",o:["0°C","100°C","-273°C","273°C"],a:2,e:"Extrapolation of V vs T(°C) line reaches V=0 at absolute zero (-273°C)."},
  {q:"Convert -73°C to Kelvin:",o:["73 K","200 K","273 K","346 K"],a:1,e:"K = -73 + 273 = 200 K"},
  {q:"A gas occupies 500 cm³ at 127°C. At what temperature will it occupy 250 cm³ (constant P)?",o:["63.5°C","-73°C","200°C","254°C"],a:1,e:"T₁ = 400 K; 500/400 = 250/T₂ → T₂ = 200 K = -73°C"},
  {q:"Which gas law is represented by V₁/T₁ = V₂/T₂?",o:["Boyle's law","Charles's law","Gay-Lussac's law","Avogadro's law"],a:1,e:"This is the mathematical expression of Charles's law."},
  {q:"At constant pressure, if the Kelvin temperature of a gas is halved, its volume:",o:["Doubles","Remains constant","Is halved","Becomes zero"],a:2,e:"Direct proportionality: halve T, halve V."},
  {q:"A balloon will burst if heated because:",o:["Gas molecules become larger","Increased kinetic energy increases volume at constant pressure","Gas turns to liquid","Pressure decreases"],a:1,e:"Charles's law: heating increases volume until material limit exceeded."},
  
  // Section D: Pressure Law & Combined Gas Law (36-45)
  {q:"Gay-Lussac's law states that at constant volume:",o:["Pressure is inversely proportional to temperature","Pressure is directly proportional to absolute temperature","Volume is directly proportional to temperature","Pressure is constant"],a:1,e:"P₁/T₁ = P₂/T₂ at constant volume."},
  {q:"A gas at 300 K has pressure 2 atm. What is its pressure at 600 K (constant V)?",o:["1 atm","2 atm","4 atm","8 atm"],a:2,e:"2/300 = P₂/600 → P₂ = 4 atm"},
  {q:"An aerosol can warns 'keep away from heat' because:",o:["The gas will liquefy","Pressure increases with temperature at constant volume","Volume decreases with temperature","The can will contract"],a:1,e:"Gay-Lussac's law: heating increases pressure, potentially causing explosion."},
  {q:"The combined gas law is expressed as:",o:["P₁V₁/T₁ = P₂V₂/T₂","P₁V₁ = P₂V₂","V₁/T₁ = V₂/T₂","PV = nRT"],a:0,e:"Combines Boyle's and Charles's laws for changing P, V, and T."},
  {q:"A gas occupies 200 cm³ at 27°C and 760 mmHg. What is its volume at 54°C and 380 mmHg?",o:["400 cm³","480 cm³","600 cm³","800 cm³"],a:1,e:"760×200/300 = 380×V₂/327 → V₂ = 480 cm³"},
  {q:"At constant volume, a gas at 400 K has pressure 800 mmHg. What is its pressure at 300 K?",o:["600 mmHg","1067 mmHg","1200 mmHg","1600 mmHg"],a:0,e:"800/400 = P₂/300 → P₂ = 600 mmHg"},
  {q:"The pressure of a gas in a sealed container increases when heated because:",o:["Molecules expand","Molecules move faster and collide more frequently/harder with walls","Number of molecules increases","Container size decreases"],a:1,e:"Higher temperature increases molecular speed and collision frequency/force."},
  {q:"Which law explains why a pressure cooker cooks food faster?",o:["Boyle's law","Charles's law","Gay-Lussac's law","Dalton's law"],a:2,e:"Sealed volume: heating increases pressure, raising boiling point of water."},
  {q:"The relationship PV/T = constant represents:",o:["Ideal gas law for fixed mass","Boyle's law only","Charles's law only","Avogadro's law"],a:0,e:"Combined gas law for a fixed amount of gas."},
  {q:"A gas at STP occupies 22.4 dm³. What is its volume at 2 atm and 273°C?",o:["11.2 dm³","22.4 dm³","44.8 dm³","89.6 dm³"],a:2,e:"STP: 1 atm, 273 K; New: 2 atm, 546 K → 1×22.4/273 = 2×V₂/546 → V₂ = 44.8 dm³"},
  
  // Section E: Ideal Gas Equation & Molar Volume (46-52)
  {q:"The ideal gas equation is:",o:["PV = nRT","P = nRT","PV = RT","P = nV/T"],a:0,e:"PV = nRT where n = moles, R = gas constant."},
  {q:"The value of R in dm³·atm·K⁻¹·mol⁻¹ is approximately:",o:["0.0821","8.314","22.4","62.4"],a:0,e:"R = 0.0821 L·atm/(mol·K) or 8.314 J/(mol·K)"},
  {q:"At STP, the molar volume of any ideal gas is:",o:["2.24 dm³","22.4 dm³","224 dm³","2240 dm³"],a:1,e:"Standard molar volume = 22.4 dm³/mol at 0°C, 1 atm."},
  {q:"How many moles of gas occupy 44.8 dm³ at STP?",o:["1","2","10","22.4"],a:1,e:"44.8/22.4 = 2 moles"},
  {q:"Calculate the mass of 11.2 dm³ of CO₂ at STP. (C=12, O=16)",o:["11 g","22 g","44 g","88 g"],a:1,e:"Moles = 11.2/22.4 = 0.5; Molar mass CO₂ = 44 g/mol; Mass = 0.5 × 44 = 22 g"},
  {q:"At 25°C and 1 atm, the molar volume of an ideal gas is:",o:["Less than 22.4 dm³","Equal to 22.4 dm³","Greater than 22.4 dm³","Zero"],a:2,e:"Higher temperature (298 K > 273 K) means greater volume than at STP."},
  {q:"Using PV = nRT, calculate the volume of 2 moles of gas at 300 K and 2 atm.",o:["12.3 dm³","24.6 dm³","49.2 dm³","98.4 dm³"],a:1,e:"V = nRT/P = 2×0.0821×300/2 = 24.6 dm³"},
  
  // Section F: Graham's Law & Vapour Density (53-60)
  {q:"Graham's law states that rate of diffusion is:",o:["Directly proportional to square root of density","Inversely proportional to square root of density","Directly proportional to density","Independent of density"],a:1,e:"Rate ∝ 1/√ρ or r₁/r₂ = √(ρ₂/ρ₁)"},
  {q:"If gas X diffuses twice as fast as SO₂ (RMM=64), what is the RMM of X?",o:["8","16","32","128"],a:1,e:"2/1 = √(64/Mₓ) → 4 = 64/Mₓ → Mₓ = 16"},
  {q:"The vapour density of a gas with RMM = 80 is:",o:["20","40","80","160"],a:1,e:"VD = RMM/2 = 80/2 = 40"},
  {q:"A gas with vapour density 14 has RMM of:",o:["7","14","28","56"],a:2,e:"RMM = 2 × VD = 2 × 14 = 28"},
  {q:"Which gas diffuses fastest at same temperature and pressure?",o:["O₂ (RMM=32)","N₂ (RMM=28)","H₂ (RMM=2)","CO₂ (RMM=44)"],a:2,e:"Lightest gas (H₂) has highest diffusion rate (inverse relationship with √M)."},
  {q:"100 cm³ of hydrogen diffuses through a porous pot in 5 seconds. How long will 100 cm³ of oxygen (RMM=32) take?",o:["2.5 s","10 s","20 s","40 s"],a:2,e:"r(H₂)/r(O₂) = √(32/2) = 4; Oxygen is 4× slower → 5 × 4 = 20 s"},
  {q:"The relationship between vapour density (VD) and relative molecular mass (M) is:",o:["M = VD","M = 2VD","VD = 2M","M = VD/2"],a:1,e:"RMM = 2 × Vapour Density (based on H₂ scale where H₂ = 2)."},
  {q:"Two gases have densities 1 g/dm³ and 4 g/dm³. The ratio of their diffusion rates is:",o:["1:1","1:2","2:1","4:1"],a:2,e:"r₁/r₂ = √(4/1) = 2/1 or 2:1"},
  
  // Bonus Section: Dalton's Law & Atomicity (61-65)
  {q:"Dalton's law of partial pressures states that total pressure equals:",o:["Product of partial pressures","Sum of partial pressures","Average of partial pressures","Difference of partial pressures"],a:1,e:"P(total) = P₁ + P₂ + P₃ + ..."},
  {q:"Air contains 20% O₂ and 80% N₂ by volume. If total pressure is 1 atm, the partial pressure of O₂ is:",o:["0.2 atm","0.5 atm","0.8 atm","1.0 atm"],a:0,e:"Partial pressure = mole fraction × total pressure = 0.20 × 1 = 0.2 atm"},
  {q:"The atomicity of ozone (O₃) is:",o:["1","2","3","4"],a:2,e:"Ozone contains 3 atoms per molecule → triatomic."},
  {q:"Which gas is monoatomic?",o:["Hydrogen","Oxygen","Nitrogen","Helium"],a:3,e:"Noble gases (He, Ne, Ar) exist as single atoms."},
  {q:"A mixture of 2 mol H₂ and 3 mol N₂ has total pressure 5 atm. The partial pressure of H₂ is:",o:["1 atm","2 atm","2.5 atm","3 atm"],a:1,e:"Mole fraction of H₂ = 2/5 = 0.4; Partial pressure = 0.4 × 5 = 2 atm"}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('kinetic_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('kinetic_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/65`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('kinetic_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=59?'Ready for JAMB!':pct>=49?'Good, review weak areas':pct>=39?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,15,25,35,45,52,60,65];
  const sectionNames=["A: Kinetic Theory & States of Matter","B: Boyle's Law","C: Charles's Law","D: Pressure Law & Combined Gas Law","E: Ideal Gas Equation & Molar Volume","F: Graham's Law & Vapour Density","Bonus: Dalton's Law & Atomicity"];
  
  for(let s=0;s<7;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`
        <h4>Question ${i+1}</h4>
        <div class="q-text">${q.q}</div>
        <div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div>
        <div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div>
        <div class="exp">${q.e}</div>
      `;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('kinetic_quiz_auth');
  sessionStorage.removeItem('kinetic_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('kinetic_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('kinetic_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
