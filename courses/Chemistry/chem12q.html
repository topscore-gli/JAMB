<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Chemistry - Rates of Reaction</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Chemistry</h1>
      <p>Rates of Reaction<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Rates of Reaction</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 50:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:3000,PASS:60};

// Section mapping
const SECTIONS={
  0:"A: Factors Affecting Rate",
  20:"B: Reaction Rate Curves",
  30:"C: Activation Energy & Theories",
  40:"D: Calculations & Applications"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 50 JAMB Rates of Reaction Questions
const QUIZ_DATA=[
  // Section A: Factors Affecting Reaction Rate (1-20)
  {q:"The rate of a chemical reaction is defined as the:",o:["Time taken for reaction to complete","Change in concentration per unit time","Volume of gas evolved","Mass of precipitate formed"],a:1,e:"Rate = Δ[Concentration]/ΔTime, measured in mol dm⁻³ s⁻¹."},
  {q:"In the reaction between marble chips and dilute HCl, which condition produces the fastest rate?",o:["5g lumps at 20°C","5g powder at 20°C","5g lumps at 40°C","5g powder at 40°C"],a:3,e:"Powder has larger surface area than lumps, and 40°C provides higher kinetic energy than 20°C. Both factors increase rate."},
  {q:"For every 10°C rise in temperature, the rate of reaction approximately:",o:["Remains constant","Doubles","Halves","Triples"],a:1,e:"This is the temperature coefficient rule (Q₁₀ ≈ 2), as more molecules attain E ≥ Ea."},
  {q:"The reaction between sodium thiosulphate and HCl is represented by:",o:["Na₂S₂O₃ + HCl → NaCl + H₂O + SO₂ + S","Na₂S₂O₃ + 2HCl → 2NaCl + H₂O + SO₂ + S","2Na₂S₂O₃ + HCl → NaCl + H₂SO₄ + S","Na₂S₂O₃ + HCl → Na₂S + H₂O + ClO₂"],a:1,e:"Correct stoichiometry: Na₂S₂O₃(aq) + 2HCl(aq) → 2NaCl(aq) + H₂O(l) + SO₂(g) + S(s)."},
  {q:"Which factor does NOT affect the rate of reaction between Zn and H₂SO₄?",o:["Temperature of the acid","Concentration of the acid","Volume of the acid","Surface area of zinc"],a:2,e:"Volume doesn't affect rate (concentration does). Rate depends on [H⁺], T, and exposed Zn surface."},
  {q:"In the iodine clock reaction, the sudden appearance of blue-black color indicates:",o:["Formation of iodine-starch complex","Completion of reaction","Maximum concentration of reactants","Catalyst exhaustion"],a:0,e:"I₂ + starch → blue-black complex. The time taken indicates reaction rate."},
  {q:"For gaseous reactions, pressure can be used as a concentration term because:",o:["P = nRT/V, so P ∝ n/V (concentration) at constant T","Pressure and concentration have same units","Gases are compressible","Pressure affects volume only"],a:0,e:"From ideal gas law, pressure is directly proportional to molar concentration at constant temperature."},
  {q:"A catalyst increases reaction rate by:",o:["Increasing collision frequency","Decreasing activation energy","Increasing reactant concentration","Changing reaction enthalpy"],a:1,e:"Catalysts provide alternative pathway with lower Ea; collision frequency remains similar but success rate increases."},
  {q:"The decomposition of H₂O₂ is catalyzed by:",o:["Concentrated H₂SO₄","MnO₂","NaOH","CuSO₄"],a:1,e:"Manganese(IV) oxide (MnO₂) is the standard catalyst for H₂O₂ decomposition: 2H₂O₂ → 2H₂O + O₂."},
  {q:"In an experiment, 2g of powdered CaCO₃ reacts faster than 2g of lump CaCO₃ with HCl because:",o:["Powder has higher density","Powder has larger total surface area","Powder has higher purity","Powder has lower molar mass"],a:1,e:"Same mass divided into smaller particles exposes more surface for acid attack (surface area ∝ rate)."},
  {q:"The unit of rate of reaction is:",o:["mol s⁻¹","mol dm⁻³ s⁻¹","dm³ mol⁻¹ s⁻¹","s mol⁻¹"],a:1,e:"Rate = concentration change/time = (mol dm⁻³)/s = mol dm⁻³ s⁻¹."},
  {q:"Which graph represents the decomposition of H₂O₂ with catalyst compared to without catalyst?",o:["Same curve, different products","Steeper initial gradient, same final volume","Same gradient, more products","Less steep, same final volume"],a:1,e:"Catalyst increases rate (steeper gradient) but doesn't change total product yield (same final O₂ volume)."},
  {q:"The rate of reaction between Mg and HCl decreases with time because:",o:["Temperature decreases","Acid concentration decreases","Pressure increases","Surface area of Mg increases"],a:1,e:"As HCl is consumed, [H⁺] decreases, leading to fewer successful collisions per unit time."},
  {q:"If a reaction takes 40s at 20°C, how long will it take at 50°C assuming rate doubles per 10°C rise?",o:["5s","10s","20s","80s"],a:0,e:"ΔT = 30°C (3 intervals). Rate increases 2³ = 8 times. Time = 40/8 = 5s."},
  {q:"Which statement about catalysts is FALSE?",o:["They are not consumed in the reaction","They increase the equilibrium yield","They lower activation energy","They are specific to reactions"],a:1,e:"Catalysts affect rate only, not equilibrium position or yield. They speed up both forward and reverse reactions equally."},
  {q:"In the reaction 2KClO₃ → 2KCl + 3O₂, MnO₂ acts as:",o:["Reactant","Oxidizing agent","Catalyst","Reducing agent"],a:2,e:"MnO₂ catalyzes KClO₃ decomposition, allowing it to occur at lower temperatures without being consumed."},
  {q:"The rate of gaseous reaction increases with pressure because:",o:["Particles move faster","More particles per unit volume","Activation energy decreases","Temperature increases"],a:1,e:"Higher pressure = smaller volume = same number of particles in less space = more frequent collisions."},
  {q:"Which combination gives the slowest reaction rate for CaCO₃ + HCl?",o:["Cold dilute acid with powder","Cold dilute acid with lumps","Hot concentrated acid with powder","Hot concentrated acid with lumps"],a:1,e:"Low temperature (cold), low concentration (dilute), and small surface area (lumps) all minimize rate."},
  {q:"The 'clock' in iodine clock reaction refers to:",o:["Time measurement device","Sudden color change after predictable time","Reaction with clock oil","24-hour reaction duration"],a:1,e:"The sudden appearance of blue-black color (I₂-starch complex) occurs after a measurable time delay indicating relative rates."},
  {q:"When concentration of reactant doubles, the rate doubles. This shows:",o:["First order reaction","Second order reaction","Zero order reaction","Third order reaction"],a:0,e:"Rate ∝ [A]¹ indicates first order kinetics with respect to that reactant."},
  
  // Section B: Reaction Rate Curves (21-30)
  {q:"On a concentration-time graph, the slope at any point represents:",o:["Average rate","Instantaneous rate","Total change","Activation energy"],a:1,e:"The gradient (slope) of the tangent at a specific point gives the rate at that exact moment."},
  {q:"Which sketch shows the correct curve for reactant concentration vs time?",o:["Straight line from top-left to bottom-right","Curve starting steep and flattening","Horizontal line","Curve starting flat and steepening"],a:1,e:"Fast initial rate (steep) when concentration is high, slowing (flattening) as reactants are consumed."},
  {q:"In a graph of gas volume vs time for a reaction, the flattening portion indicates:",o:["Reaction stopped due to catalyst poisoning","One reactant is exhausted","Temperature dropped to zero","Pressure became too high"],a:1,e:"No more gas produced = limiting reactant consumed = reaction complete."},
  {q:"The initial rate of a reaction is best determined by:",o:["Total volume of gas produced","Gradient at t = 0","Time for half-completion","Final concentration"],a:1,e:"Draw tangent at origin (t=0); its slope gives initial rate before significant concentration change."},
  {q:"Two curves show reaction with and without catalyst. The catalyzed curve:",o:["Reaches same plateau faster","Reaches higher plateau","Has same gradient throughout","Shows no initial change"],a:0,e:"Catalyst increases rate (steeper/faster to plateau) without changing final yield (same plateau height)."},
  {q:"If rate is constant throughout reaction, the concentration-time graph is:",o:["Exponential curve","Straight line with negative gradient","Horizontal line","Parabola"],a:1,e:"Zero-order reactions show constant rate: straight line decrease until reactant exhausted."},
  {q:"The half-life of a reactant can be determined from:",o:["Time for concentration to halve","Time for reaction to complete","Maximum concentration reached","Initial rate value"],a:0,e:"Half-life (t½) is the time required for reactant concentration to reduce to half its initial value."},
  {q:"Comparing two curves at same temperature but different concentrations:",o:["Higher concentration has steeper initial gradient","Both have identical gradients","Lower concentration finishes first","Both plateau at same volume regardless of stoichiometry"],a:0,e:"Higher [reactant] = more collisions = faster rate = steeper initial slope."},
  {q:"The area under a rate-time curve represents:",o:["Total energy released","Concentration change","Activation energy","Temperature change"],a:1,e:"Rate × Time = Concentration change (mathematically, integration of rate gives concentration)."},
  {q:"When drawing a tangent to find instantaneous rate, the line should:",o:["Pass through origin","Touch curve at one point only","Connect two data points","Be perpendicular to curve"],a:1,e:"A tangent touches the curve at exactly one point; its slope gives instantaneous rate at that point."},
  
  // Section C: Activation Energy & Theories (31-40)
  {q:"Activation energy is defined as:",o:["Total energy of reactants","Energy given out during reaction","Minimum energy for successful collision","Average kinetic energy of particles"],a:2,e:"Ea is the energy barrier; particles must possess ≥ Ea and correct orientation to react."},
  {q:"According to collision theory, which condition is NOT required for reaction?",o:["Particles must collide","Collision must be head-on","Energy ≥ Ea","Proper orientation"],a:1,e:"Collision theory requires collision, sufficient energy, and proper orientation—not necessarily 'head-on.'"},
  {q:"The Arrhenius equation (k = Ae^(-Ea/RT)) shows that rate constant k increases when:",o:["Ea increases or T decreases","Ea decreases or T increases","Both Ea and T increase","Both Ea and T decrease"],a:1,e:"Lower Ea (exponent less negative) or higher T (denominator larger, exponent less negative) increases k."},
  {q:"A reaction with high activation energy is generally:",o:["Very fast at room temperature","Slow at room temperature","Instantaneous","Independent of temperature"],a:1,e:"High Ea means few molecules have sufficient energy to react at normal temperatures."},
  {q:"Catalysts affect activation energy by:",o:["Increasing it for endothermic reactions","Decreasing it for all reactions","Eliminating it completely","Changing it only for exothermic reactions"],a:1,e:"Catalysts provide alternative pathway with lower Ea, regardless of whether reaction is exo/endothermic."},
  {q:"In the Maxwell-Boltzmann distribution, increasing temperature:",o:["Shifts peak to lower energy","Increases area under curve","Broadens curve and shifts peak right","Decreases total number of molecules"],a:2,e:"Higher T = broader energy distribution, peak moves to higher energy, more molecules exceed Ea."},
  {q:"The shaded area under Maxwell-Boltzmann curve beyond Ea represents:",o:["Total molecules","Molecules with insufficient energy","Molecules able to react","Activation energy value"],a:2,e:"Area to right of Ea = fraction of molecules with kinetic energy ≥ Ea (can react upon collision)."},
  {q:"Photochemical reactions occur in presence of light because:",o:["Light increases pressure","Photons provide energy to overcome Ea","Light acts as catalyst","Temperature increases automatically"],a:1,e:"E = hν; photon energy excites molecules/breaks bonds, providing energy to overcome activation barrier."},
  {q:"Methane reacts with chlorine explosively in sunlight but slowly in dark because:",o:["Light creates chlorine radicals","Temperature is higher in light","Pressure increases in light","Methane evaporates faster"],a:0,e:"UV light homolytically splits Cl₂ → 2Cl· radicals, initiating chain reaction with low Ea."},
  {q:"Which statement correctly describes effective collision?",o:["Any collision between reactant molecules","Collision with E < Ea but high frequency","Collision with E ≥ Ea and proper orientation","Collision producing maximum products"],a:2,e:"Only collisions with sufficient energy AND correct molecular orientation lead to reaction."},
  
  // Section D: Calculations & Applications (41-50)
  {q:"Calculate the rate when concentration changes from 0.8 to 0.2 mol dm⁻³ in 30s:",o:["0.02 mol dm⁻³ s⁻¹","0.04 mol dm⁻³ s⁻¹","0.06 mol dm⁻³ s⁻¹","0.08 mol dm⁻³ s⁻¹"],a:0,e:"Rate = (0.8-0.2)/30 = 0.6/30 = 0.02 mol dm⁻³ s⁻¹."},
  {q:"A reaction has rate constant 0.05 s⁻¹ at 25°C. If rate doubles per 10°C rise, calculate rate at 55°C:",o:["0.10 s⁻¹","0.20 s⁻¹","0.30 s⁻¹","0.40 s⁻¹"],a:3,e:"ΔT = 30°C (3 intervals). Rate = 0.05 × 2³ = 0.05 × 8 = 0.40 s⁻¹."},
  {q:"For the reaction 2H₂O₂ → 2H₂O + O₂, 0.4 mol of O₂ is produced in 20s in 2 dm³ vessel. Calculate average rate:",o:["0.01 mol dm⁻³ s⁻¹","0.02 mol dm⁻³ s⁻¹","0.04 mol dm⁻³ s⁻¹","0.08 mol dm⁻³ s⁻¹"],a:0,e:"[O₂] = 0.4/2 = 0.2 mol dm⁻³. Rate = 0.2/20 = 0.01 mol dm⁻³ s⁻¹ (with respect to O₂)."},
  {q:"A cube of side 3cm is divided into 27 smaller cubes. The surface area increases by factor of:",o:["2","3","4","9"],a:1,e:"Original SA = 6×9 = 54 cm². Small cubes: side 1cm, each SA = 6 cm². Total = 27×6 = 162 cm². Factor = 162/54 = 3."},
  {q:"If catalyst reduces Ea from 100 kJ/mol to 60 kJ/mol, the factor by which rate increases (at 300K, approximating) is proportional to:",o:["e^(40/300R)","e^(-40/300R)","e^(40/R)","40/300"],a:0,e:"Rate ∝ e^(-Ea/RT). Ratio = e^[-(60-100)/300R] = e^(40/300R)."},
  {q:"In an experiment, 0.1g Mg ribbon reacts with excess HCl in 20s. Predict time for 0.1g Mg powder at same temperature:",o:["40s","20s","10s","5s"],a:3,e:"Powder has much larger surface area; rate increases significantly, time decreases substantially (typically 4-10× faster)."},
  {q:"The gradient of a tangent drawn at 100s on a concentration-time curve is -0.015 mol dm⁻³ s⁻¹. This represents:",o:["Average rate over 100s","Rate at exactly 100s","Total concentration change","Initial rate"],a:1,e:"Tangent gradient at specific time gives instantaneous rate at that moment (negative sign indicates decrease)."},
  {q:"For a first-order reaction, if half-life is 10 minutes, the time for concentration to fall to 25% of initial is:",o:["10 minutes","15 minutes","20 minutes","25 minutes"],a:2,e:"100% → 50% (first half-life, 10 min) → 25% (second half-life, another 10 min). Total = 20 min."},
  {q:"Which does NOT correctly describe the effect of increasing temperature on reacting particles?",o:["Average kinetic energy increases","Activation energy decreases","Collision frequency increases","Proportion of successful collisions increases"],a:1,e:"Temperature does not change activation energy (Ea is constant for a given reaction; only catalysts change Ea)."},
  {q:"A student investigates rate of reaction between Zn and H₂SO₄. Which is the independent variable when testing effect of acid concentration?",o:["Volume of gas evolved","Time taken","Concentration of acid","Mass of zinc used"],a:2,e:"Independent variable is what the experimenter changes (acid concentration); dependent variable is what is measured (time or gas volume)."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('rates_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('rates_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/50`;
  
  document.getElementById('question').textContent=q.q;
  
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('rates_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=35?'Good, review weak areas':pct>=25?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  const sections=[0,20,30,40,50];
  const sectionNames=["A: Factors Affecting Rate","B: Reaction Rate Curves","C: Activation Energy & Theories","D: Calculations & Applications"];
  
  for(let s=0;s<4;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('rates_quiz_auth');
  sessionStorage.removeItem('rates_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('rates_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('rates_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
</body>
