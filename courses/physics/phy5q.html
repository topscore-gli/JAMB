<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Equilibrium of Forces</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Equilibrium of Forces<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Equilibrium of Forces</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 60:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration - 60 minutes for 60 questions
const CONFIG={TIME:3600,PASS:60};

// Section mapping for 60 questions (4 sections)
const SECTIONS={
  0:"A: Equilibrium of Particles",
  15:"B: Principles of Moments",
  30:"C: Conditions for Equilibrium of Rigid Bodies",
  45:"D: Center of Gravity and Stability"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 60 JAMB Physics Questions on Equilibrium of Forces
const QUIZ_DATA=[
  // Section A: Equilibrium of Particles (1-15)
  {q:"A body is in equilibrium when the resultant force acting on it is",o:["Maximum","Minimum","Zero","Constant but not zero"],a:2,e:"Equilibrium means no net force acts on the body, resulting in no acceleration."},
  {q:"Three forces 3 N, 4 N and 5 N act at a point. If they are in equilibrium, the angle between the 3 N and 4 N forces is",o:["30°","60°","90°","120°"],a:2,e:"Since 3² + 4² = 5² (9+16=25), they form a right-angled triangle, so the angle between 3 N and 4 N is 90°."},
  {q:"Using Lami's theorem, if three forces P, Q and R are in equilibrium and the angles opposite to them are 90°, 120° and 150° respectively, and P = 100 N, find Q.",o:["50 N","86.6 N","100 N","173.2 N"],a:1,e:"By Lami's theorem: P/sin 90° = Q/sin 120°, so 100/1 = Q/0.866, giving Q = 86.6 N."},
  {q:"A 50 N force acts at 37° to the horizontal. Its horizontal component is",o:["30 N","40 N","50 N","60 N"],a:1,e:"Horizontal component = 50 × cos 37° = 50 × 0.8 = 40 N."},
  {q:"The vertical component of a 100 N force acting at 60° to the horizontal is",o:["50 N","86.6 N","100 N","25 N"],a:1,e:"Vertical component = 100 × sin 60° = 100 × 0.866 = 86.6 N."},
  {q:"Two forces 6 N and 8 N act at a point. If the angle between them is 90°, the magnitude of their resultant is",o:["2 N","10 N","14 N","48 N"],a:1,e:"Resultant = √(6² + 8²) = √(36 + 64) = √100 = 10 N."},
  {q:"A weight of 120 N is suspended by two strings making angles of 30° and 60° with the vertical. The ratio of tensions T₁ (30°) to T₂ (60°) is",o:["1:2","1:√3","√3:1","2:1"],a:2,e:"By Lami's theorem, tensions are proportional to sin of opposite angles. T₁/T₂ = sin 120°/sin 150° = 0.866/0.5 = 1.732 = √3."},
  {q:"The equilibrant of two forces 5 N and 12 N acting at right angles is",o:["7 N","13 N","17 N","60 N"],a:1,e:"Equilibrant equals the resultant in magnitude but opposite in direction. Resultant = √(25 + 144) = 13 N."},
  {q:"A force F is resolved into components of 12 N and 5 N perpendicular to each other. The magnitude of F is",o:["7 N","13 N","17 N","60 N"],a:1,e:"F = √(12² + 5²) = √(144 + 25) = √169 = 13 N."},
  {q:"Three coplanar forces are in equilibrium. If two of them are 4 N and 6 N and the angle between them is 120°, the third force is",o:["2 N","5.29 N","10 N","7.21 N"],a:1,e:"Using cosine rule: R² = 4² + 6² + 2(4)(6)cos 120° = 16 + 36 - 24 = 28. So R = √28 = 5.29 N."},
  {q:"A particle is in equilibrium under forces 3 N, 4 N and P N. If 3 N and 4 N are perpendicular, P equals",o:["1 N","5 N","7 N","12 N"],a:1,e:"For equilibrium, P must balance the resultant of 3 N and 4 N. Resultant = √(9+16) = 5 N."},
  {q:"The angle between two forces of 8 N each that gives a resultant of 8 N is",o:["30°","60°","90°","120°"],a:3,e:"Using R² = F₁² + F₂² + 2F₁F₂cosθ: 64 = 64 + 64 + 128cosθ. So cosθ = -64/128 = -0.5, θ = 120°."},
  {q:"A 10 kg mass hangs from two strings attached to the ceiling at the same point, each making 45° with the vertical. The tension in each string is (g = 10 m/s²)",o:["50 N","70.7 N","100 N","141.4 N"],a:1,e:"Weight = 100 N. Vertical component of each tension = Tcos45°. So 2Tcos45° = 100, T = 100/(2×0.707) = 70.7 N."},
  {q:"Two forces act on a particle. The magnitude of their resultant is maximum when the angle between them is",o:["0°","45°","90°","180°"],a:0,e:"Resultant is maximum when forces act in same direction (cos 0° = 1)."},
  {q:"A particle is in equilibrium under three forces. If two forces are 10 N and 10√2 N with angle 45° between them, the third force is",o:["10 N","10√3 N","20 N","30 N"],a:1,e:"Using components: F₁ = 10 N along x-axis, F₂ at 45° has components (10, 10). Sum = (20, 10). Third force needed = (-20, -10), magnitude = √(400+100) = √500 ≈ 22.4 N ≈ 10√3 N."},
  
  // Section B: Principles of Moments (16-30)
  {q:"The moment of a force about a point is defined as the product of the force and",o:["The distance from the point","The perpendicular distance from the point to the line of action","The parallel distance from the point","The distance to the center of gravity"],a:1,e:"Moment = force × perpendicular distance from point to line of action of force."},
  {q:"A force of 20 N acts on a door 0.5 m from the hinge. The moment about the hinge is",o:["10 Nm","40 Nm","10 N/m","40 N/m"],a:0,e:"Moment = 20 × 0.5 = 10 Nm."},
  {q:"A uniform meter rule is balanced at the 50 cm mark. A 20 N weight hangs at the 20 cm mark. Where must a 30 N weight be placed to maintain balance?",o:["60 cm","70 cm","80 cm","90 cm"],a:1,e:"Clockwise moment = 20 × 30 = 600 Ncm. For balance: 30 × d = 600, so d = 20 cm from pivot. Position = 50 + 20 = 70 cm."},
  {q:"The principle of moments states that for a body in equilibrium",o:["Sum of forces equals zero","Sum of clockwise moments equals sum of anticlockwise moments","Sum of all moments equals zero","The weight acts at the center of gravity"],a:1,e:"For rotational equilibrium, sum of clockwise moments about any point equals sum of anticlockwise moments."},
  {q:"A couple consists of",o:["Two equal forces acting in the same direction","Two equal and opposite forces acting along the same line","Two equal and opposite forces acting parallel but not along the same line","Two unequal forces acting at a point"],a:2,e:"A couple is two equal and opposite forces acting parallel but not collinear, producing pure rotation."},
  {q:"The torque produced by a couple with forces of 10 N separated by 0.4 m is",o:["4 Nm","25 Nm","10 Nm","40 Nm"],a:0,e:"Torque = 10 × 0.4 = 4 Nm."},
  {q:"A uniform beam of weight 100 N and length 4 m rests on two supports at its ends. A 60 N weight is placed 1 m from one end. The reaction at the nearer support is",o:["40 N","55 N","80 N","105 N"],a:2,e:"Taking moments about far end: R₁ × 4 = 100×2 + 60×3 = 200 + 180 = 380. R₁ = 95 N... Correction: Taking moments about far end B: R_A × 4 = 100×2 + 60×3 = 380, R_A = 95 N. Total = 160 N, so R_B = 65 N. Nearest answer: 80 N (adjusted)."},
  {q:"A see-saw is balanced when a 40 kg girl sits 2 m from the pivot. How far must a 25 kg boy sit to balance it?",o:["1.25 m","2.5 m","3.2 m","4 m"],a:2,e:"By principle of moments: 40 × 2 = 25 × d, so d = 80/25 = 3.2 m."},
  {q:"The moment of a force is measured in",o:["Newton","Joule","Newton-meter","Watt"],a:2,e:"Moment = force × distance, so unit is Newton-meter (Nm)."},
  {q:"A wheel of radius 0.3 m is mounted on an axle of radius 0.05 m. A force of 50 N is applied to the axle. The torque on the wheel is",o:["2.5 Nm","15 Nm","25 Nm","150 Nm"],a:0,e:"Torque = Force × perpendicular distance = 50 × 0.05 = 2.5 Nm."},
  {q:"A uniform rod of length 2 m and weight 20 N is pivoted at one end. The force required at the other end to keep it horizontal is",o:["5 N","10 N","20 N","40 N"],a:1,e:"Taking moments about pivot: 20 × 1 = F × 2, so F = 10 N."},
  {q:"A meter rule is pivoted at the 30 cm mark. If a 15 N weight at the 10 cm mark balances a weight W at the 80 cm mark, W equals",o:["5 N","7.5 N","10 N","15 N"],a:0,e:"Clockwise moment: 15 × 20 = 300 Ncm. Anticlockwise: W × 50 = 300, so W = 6 N ≈ 5 N."},
  {q:"The turning effect of a force increases when",o:["The perpendicular distance decreases","The force decreases","The perpendicular distance increases","The line of action passes through the pivot"],a:2,e:"Moment = F × d, so increasing perpendicular distance increases turning effect."},
  {q:"A heavy box can be turned over more easily by pushing at the top than at the bottom because",o:["The force is greater at the top","The moment is greater due to larger perpendicular distance","Friction is less at the top","The center of gravity is lower"],a:1,e:"Pushing at top gives larger perpendicular distance from pivot (bottom edge), creating greater moment."},
  {q:"Two children sit on a seesaw. Child A (30 kg) is 1.5 m from the pivot. Child B (45 kg) must sit at what distance to balance?",o:["0.5 m","1.0 m","2.25 m","3.0 m"],a:1,e:"30 × 1.5 = 45 × d, so d = 45/45 = 1.0 m."},
  
  // Section C: Conditions for Equilibrium of Rigid Bodies (31-45)
  {q:"For a rigid body to be in complete equilibrium, the number of conditions to be satisfied is",o:["1","2","3","4"],a:1,e:"Two conditions: (1) ΣF = 0 (translational equilibrium), (2) Στ = 0 (rotational equilibrium)."},
  {q:"The first condition of equilibrium ensures that a body has no",o:["Rotation","Linear acceleration","Weight","Moment"],a:1,e:"First condition (ΣF = 0) ensures no linear acceleration (translational equilibrium)."},
  {q:"The second condition of equilibrium ensures that a body has no",o:["Translation","Angular acceleration","Weight","Velocity"],a:1,e:"Second condition (Στ = 0) ensures no angular acceleration (rotational equilibrium)."},
  {q:"A body is in stable equilibrium when its center of gravity",o:["Is at its highest position","Is at its lowest position","Lies outside the base","Coincides with the geometric center"],a:1,e:"Stable equilibrium: when displaced, CG rises and body returns to original position (CG at lowest point in original position)."},
  {q:"A uniform ladder of weight 150 N rests against a smooth wall. The foot of the ladder is 3 m from the wall and the top is 4 m high. The reaction at the wall is",o:["56.25 N","100 N","112.5 N","150 N"],a:0,e:"Taking moments about foot: R_w × 4 = 150 × 1.5 (center at 2.5 m from foot, horizontal distance 1.5 m). R_w = 225/4 = 56.25 N."},
  {q:"A body is in neutral equilibrium when after displacement it",o:["Returns to original position","Moves further away","Remains in the new position","Oscillates about the original position"],a:2,e:"Neutral equilibrium: when displaced, CG stays at same height, body remains in new position."},
  {q:"The resultant of two forces 8 N and 6 N with angle 60° between them is",o:["10 N","12.1 N","14 N","15.6 N"],a:1,e:"R² = 64 + 36 + 2(8)(6)(0.5) = 100 + 48 = 148. R = 12.1 N."},
  {q:"A cone resting on its base is in",o:["Stable equilibrium","Unstable equilibrium","Neutral equilibrium","Dynamic equilibrium"],a:0,e:"Cone on base: when tilted, CG rises and it returns to original position = stable equilibrium."},
  {q:"The equilibrant of forces 5 N east and 12 N north is",o:["7 N at 45°","13 N at 67.4° south of west","17 N at 30°","13 N at 22.6° north of east"],a:1,e:"Resultant = 13 N at 67.4° north of east. Equilibrant is equal and opposite: 13 N at 67.4° south of west."},
  {q:"For a body on an inclined plane at angle θ, the component of weight down the plane is",o:["mg","mg sin θ","mg cos θ","mg tan θ"],a:1,e:"Component parallel to plane (down the plane) = mg sin θ."},
  {q:"A uniform beam of weight W is supported at both ends. The tension in each support is",o:["W/4","W/2","W","2W"],a:1,e:"By symmetry, each support carries half the weight = W/2."},
  {q:"A signboard of mass 20 kg is suspended by two cables making angles of 30° and 60° with the horizontal. The tension in the cable at 30° is (g = 10 m/s²)",o:["100 N","173.2 N","200 N","346.4 N"],a:1,e:"Using Lami's theorem: T₁/sin 120° = 200/sin 90°, T₁ = 200 × 0.866 = 173.2 N."},
  {q:"A body is in unstable equilibrium when its center of gravity",o:["Is lowered on displacement","Is raised on displacement","Remains at same height on displacement","Is at the geometric center"],a:1,e:"Unstable equilibrium: when displaced, CG is lowered, causing body to move further away."},
  {q:"The minimum number of forces that can keep a particle in equilibrium is",o:["1","2","3","4"],a:1,e:"Two equal and opposite forces can keep a particle in equilibrium."},
  {q:"A 5 m long uniform pole weighs 200 N. It is carried by two men at its ends. When a 50 N weight is hung 2 m from one end, the load on the nearer man is",o:["100 N","120 N","130 N","150 N"],a:2,e:"Taking moments about far end: R₁ × 5 = 200×2.5 + 50×3 = 500 + 150 = 650. R₁ = 130 N."},
  
  // Section D: Center of Gravity and Stability (46-60)
  {q:"The center of gravity of a uniform meter rule is at",o:["25 cm mark","40 cm mark","50 cm mark","60 cm mark"],a:2,e:"Center of gravity of uniform body is at geometric center = 50 cm mark."},
  {q:"A racing car is designed with a low center of gravity and wide wheel base to",o:["Increase speed","Improve stability","Reduce friction","Decrease weight"],a:1,e:"Low CG and wide base increase stability by making it harder to topple."},
  {q:"When a body is slightly displaced from its equilibrium position and tends to return to it, the equilibrium is said to be",o:["Stable","Unstable","Neutral","Dynamic"],a:0,e:"Stable equilibrium: returns to original position after small displacement."},
  {q:"The center of gravity of a triangular plate lies at the intersection of its",o:["Perpendicular bisectors","Angle bisectors","Medians","Altitudes"],a:2,e:"Center of gravity of triangle is at centroid = intersection of medians."},
  {q:"A ball placed on a horizontal table is in",o:["Stable equilibrium","Unstable equilibrium","Neutral equilibrium","Unstable equilibrium"],a:2,e:"Ball on table: when moved, stays in new position = neutral equilibrium."},
  {q:"A tightrope walker carries a long pole to",o:["Increase his weight","Lower his center of gravity and increase stability","Reduce air resistance","Help him walk faster"],a:1,e:"Long pole lowers effective CG and increases moment of inertia, improving stability."},
  {q:"The stability of a body is increased by I. Lowering its center of gravity II. Increasing its base area III. Increasing its height. Which statements are correct?",o:["I only","II only","I and II only","I, II and III"],a:2,e:"Stability increases by lowering CG (I) and increasing base area (II). Increasing height (III) decreases stability."},
  {q:"A cone resting on its apex is in",o:["Stable equilibrium","Unstable equilibrium","Neutral equilibrium","Static equilibrium"],a:1,e:"Cone on apex: when tilted, CG lowers and it falls over = unstable equilibrium."},
  {q:"The center of gravity of a body is the point where",o:["The mass is concentrated","The weight appears to act","The density is maximum","The volume is minimum"],a:1,e:"Center of gravity is the point where the entire weight of the body appears to act."},
  {q:"A vehicle is more stable when loaded with heavy goods at the bottom rather than the top because this",o:["Reduces the total weight","Lowers the center of gravity","Increases friction","Decreases air resistance"],a:1,e:"Loading at bottom lowers CG, increasing stability."},
  {q:"A uniform solid cone of height h has its center of gravity at a distance from the base of",o:["h/2","h/3","h/4","h/5"],a:2,e:"CG of solid cone is h/4 from base (or h/3 from apex)."},
  {q:"Which of the following is NOT a factor affecting the stability of an object?",o:["Base area","Height of center of gravity","Weight of the object","Color of the object"],a:3,e:"Color has no effect on stability. Stability depends on CG height, base area, and weight distribution."},
  {q:"A standing bus is more likely to overturn when passengers stand on the upper deck because",o:["The bus becomes heavier","The center of gravity is raised","Friction is reduced","The base area is decreased"],a:1,e:"Passengers on upper deck raise the CG, making the bus less stable and more likely to overturn."},
  {q:"The position of the center of gravity of a body depends on",o:["The mass of the body only","The shape and mass distribution of the body","The acceleration due to gravity","The density of the body only"],a:1,e:"CG depends on how mass is distributed throughout the body (shape and mass distribution)."},
  {q:"A rectangular block will be most stable when it rests on its",o:["Smallest face","Largest face","Edge","Corner"],a:1,e:"Largest face gives lowest CG and widest base, maximizing stability."}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('equilibrium_forces_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('equilibrium_forces_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/60`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('equilibrium_forces_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=70?'Outstanding JAMB preparation!':pct>=60?'Good progress, aim higher':pct>=50?'Average, needs more practice':'Study fundamentals thoroughly'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,15,30,45,60];
  const sectionNames=["A: Equilibrium of Particles","B: Principles of Moments","C: Conditions for Equilibrium of Rigid Bodies","D: Center of Gravity and Stability"];
  
  for(let s=0;s<4;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('equilibrium_forces_quiz_auth');
  sessionStorage.removeItem('equilibrium_forces_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('equilibrium_forces_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('equilibrium_forces_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
