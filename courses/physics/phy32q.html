<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Electrical Energy & Power</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Electrical Energy & Power (Chapter 32)<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Electrical Energy & Power</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 60:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:3600,PASS:60}; // 60 minutes for 60 questions

// Section mapping
const SECTIONS={
  0:"A: Concepts of Energy & Power",
  10:"B: Commercial Units (kWh)",
  20:"C: Electric Power Transmission",
  30:"D: Heating Effects of Current",
  40:"E: Electrical Wiring of Houses",
  50:"F: Use of Fuses"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 60 JAMB Physics Electrical Energy & Power Questions
const QUIZ_DATA=[
  // Section A: Concepts of Electrical Energy and Power (1-10)
  {q:"An electric lamp is rated 240V, 60W. Calculate the energy it consumes in 2 hours in joules.",o:["4.32 × 10⁵ J","2.16 × 10⁵ J","7.2 × 10⁴ J","1.08 × 10⁵ J","6.0 × 10⁵ J"],a:0,e:"E = Pt = 60W × (2 × 3600)s = 432,000J = 4.32 × 10⁵ J"},
  {q:"A 1000W electric iron is used for 30 minutes. Calculate the electrical energy consumed in kWh.",o:["0.25 kWh","0.5 kWh","1.0 kWh","2.0 kWh","1.5 kWh"],a:1,e:"E = Pt = 1kW × 0.5h = 0.5 kWh"},
  {q:"The power dissipated in a 20Ω resistor carrying 3A current is:",o:["60W","90W","180W","120W","240W"],a:2,e:"P = I²R = 3² × 20 = 9 × 20 = 180W"},
  {q:"An electric motor takes 5A from a 240V supply. Calculate its power rating.",o:["48W","1200W","2400W","120W","600W"],a:1,e:"P = VI = 240 × 5 = 1200W"},
  {q:"A device consumes 3.6 × 10⁶ J of energy in 1 hour. What is its power rating?",o:["100W","1000W","3600W","1W","360W"],a:1,e:"P = E/t = 3.6 × 10⁶ / 3600 = 1000W = 1kW"},
  {q:"Calculate the current drawn by a 2kW electric kettle operating at 250V.",o:["8A","12.5A","5A","20A","2.5A"],a:0,e:"I = P/V = 2000/250 = 8A"},
  {q:"The resistance of a 100W, 240V bulb is:",o:["576Ω","2.4Ω","24Ω","5760Ω","240Ω"],a:0,e:"R = V²/P = 240²/100 = 57,600/100 = 576Ω"},
  {q:"An electric heater draws 10A at 240V for 5 hours. Calculate the energy consumed in kWh.",o:["1.2 kWh","12 kWh","120 kWh","2.4 kWh","24 kWh"],a:1,e:"E = VIt = 240 × 10 × 5 = 12,000Wh = 12 kWh"},
  {q:"Which formula correctly relates power, current and resistance?",o:["P = IR²","P = I²R","P = I/R²","P = I²/R","P = IR"],a:1,e:"From Ohm's law and P = VI, substituting V = IR gives P = I²R"},
  {q:"A 500W device operates for 8 hours daily. Calculate the weekly energy consumption in kWh.",o:["4 kWh","28 kWh","40 kWh","56 kWh","20 kWh"],a:1,e:"Daily = 0.5kW × 8h = 4 kWh; Weekly = 4 × 7 = 28 kWh"},
  
  // Section B: Commercial Units (kWh) (11-20)
  {q:"Convert 2 kWh to joules.",o:["7.2 × 10⁶ J","3.6 × 10⁶ J","1.8 × 10⁶ J","7.2 × 10⁵ J","3.6 × 10⁵ J"],a:0,e:"2 × 3.6 × 10⁶ = 7.2 × 10⁶ J"},
  {q:"A household consumes 250 kWh in a month. If electricity costs ₦50 per kWh, calculate the bill.",o:["₦1,250","₦5,000","₦12,500","₦25,000","₦2,500"],a:2,e:"Cost = 250 × 50 = ₦12,500"},
  {q:"The cost of running five 60W lamps and four 100W lamps for 20 hours at ₦10 per kWh is:",o:["₦120","₦140","₦160","₦280","₦200"],a:1,e:"Total power = (5×60) + (4×100) = 700W = 0.7kW; Energy = 0.7 × 20 = 14kWh; Cost = 14 × 10 = ₦140"},
  {q:"An electric motor with 80% efficiency takes 2500W input power. Calculate its output power.",o:["2000W","3125W","2500W","200W","2250W"],a:0,e:"Output = Efficiency × Input = 0.8 × 2500 = 2000W"},
  {q:"A 2HP motor operates for 5 hours. Calculate energy consumed in kWh. [1HP = 746W]",o:["1.492 kWh","7.46 kWh","10 kWh","14.92 kWh","5 kWh"],a:1,e:"Power = 2 × 746 = 1492W = 1.492kW; Energy = 1.492 × 5 = 7.46 kWh"},
  {q:"How long will a 3kW heater take to consume 12 kWh?",o:["4 hours","36 hours","0.25 hours","12 hours","6 hours"],a:0,e:"t = E/P = 12/3 = 4 hours"},
  {q:"A prepaid meter shows 50 kWh remaining. For how many hours can a 2000W air conditioner run?",o:["25 hours","100 hours","2.5 hours","250 hours","50 hours"],a:0,e:"t = 50kWh/2kW = 25 hours"},
  {q:"Calculate the cost of operating a 1500W iron for 3 hours daily for 30 days at ₦45 per kWh.",o:["₦2,025","₦6,075","₦202.5","₦607.5","₦4,050"],a:1,e:"Daily = 1.5 × 3 = 4.5 kWh; Monthly = 4.5 × 30 = 135 kWh; Cost = 135 × 45 = ₦6,075"},
  {q:"Which is the commercial unit of electrical energy?",o:["Watt","Joule","Kilowatt-hour","Volt-ampere","Ampere-hour"],a:2,e:"kWh is the commercial unit used by electricity companies"},
  {q:"A factory consumes 5000 kWh monthly. If charged at ₦35 per kWh plus a fixed charge of ₦5000, calculate total bill.",o:["₦175,000","₦180,000","₦5,175","₦30,000","₦200,000"],a:1,e:"Energy cost = 5000 × 35 = ₦175,000; Total = 175,000 + 5,000 = ₦180,000"},
  
  // Section C: Electric Power Transmission (21-30)
  {q:"Why is electrical power transmitted at high voltage?",o:["To increase current","To reduce power loss (I²R)","To increase frequency","To reduce resistance","To increase power"],a:1,e:"High voltage means lower current for same power, reducing I²R heat losses"},
  {q:"Power supply is transmitted at very high voltage and low current in order to:",o:["Increase the power supply","Prevent overheating of the coil","Make it travel fast","Make it pass through transformers","Increase voltage"],a:1,e:"Lower current reduces heating (I²R loss) in transmission cables"},
  {q:"A power station generates 100MW at 25kV. Calculate the transmission current before stepping up.",o:["2500A","4000A","25,000A","400A","250A"],a:1,e:"I = P/V = 100×10⁶ / 25×10³ = 4000A"},
  {q:"This power is stepped up to 400kV. Calculate the new current.",o:["250A","400A","25A","4000A","2500A"],a:0,e:"I = 100×10⁶ / 400×10³ = 250A"},
  {q:"If transmission line resistance is 10Ω, calculate power loss at 25kV transmission.",o:["16MW","160MW","1.6MW","160kW","16kW"],a:1,e:"P_loss = I²R = 4000² × 10 = 160,000,000W = 160MW"},
  {q:"Calculate power loss at 400kV transmission (same line).",o:["625kW","6.25MW","62.5kW","625MW","6.25kW"],a:0,e:"P_loss = 250² × 10 = 625,000W = 625kW"},
  {q:"What is the efficiency of transmission at 400kV?",o:["99.375%","93.75%","84%","99.9375%","95%"],a:0,e:"Efficiency = (100,000 - 0.625)/100,000 × 100 = 99.375%"},
  {q:"Which device is used to step up voltage for transmission?",o:["Generator","Transformer","Motor","Rectifier","Inverter"],a:1,e:"Transformers change AC voltage levels"},
  {q:"Transformers work on the principle of:",o:["Electrostatic induction","Electromagnetic induction","Mutual capacitance","Self-induction only","Magnetic conduction"],a:1,e:"Faraday's law of electromagnetic induction"},
  {q:"Why can't transformers work with DC?",o:["DC has zero frequency","DC doesn't produce changing magnetic flux","DC is too dangerous","DC voltage is too low","DC has high resistance"],a:1,e:"Transformers require changing current to induce voltage in secondary coil"},
  
  // Section D: Heating Effects of Electric Current (31-40)
  {q:"The heating element in an electric iron is made of:",o:["Copper","Nichrome","Aluminium","Silver","Tungsten"],a:1,e:"Nichrome has high resistivity and high melting point"},
  {q:"Calculate heat produced when 5A flows through 40Ω for 2 minutes.",o:["400J","24,000J","120,000J","240,000J","60,000J"],a:2,e:"H = I²Rt = 25 × 40 × 120 = 120,000J"},
  {q:"An electric kettle (2000W, 240V) heats 2kg water from 20°C to 100°C. Calculate time required. [c = 4200J/kg·K]",o:["168s","336s","672s","840s","420s"],a:1,e:"Q = mcΔT = 2 × 4200 × 80 = 672,000J; t = Q/P = 672,000/2000 = 336s"},
  {q:"Which material is NOT suitable for heating elements?",o:["Tungsten","Nichrome","Copper","Kanthal","Platinum"],a:2,e:"Copper has low resistance and oxidizes easily; not suitable"},
  {q:"The principle of electric heating is based on:",o:["Ohm's law","Joule's law","Coulomb's law","Ampere's law","Faraday's law"],a:1,e:"Joule's law: H = I²Rt"},
  {q:"Calculate the power of a heating element with resistance 50Ω at 240V.",o:["4.8W","1152W","12,000W","48W","240W"],a:1,e:"P = V²/R = 240²/50 = 57,600/50 = 1152W"},
  {q:"Why does a tungsten filament lamp produce light?",o:["Chemical reaction","High resistance heating to incandescence","Fluorescence","Phosphorescence","Reflection"],a:1,e:"Filament heats to high temperature (2500K+) emitting visible light"},
  {q:"An immersion heater (1500W) is used for 10 minutes. Calculate heat energy produced in kJ.",o:["15kJ","150kJ","900kJ","1500kJ","600kJ"],a:2,e:"E = Pt = 1500 × 600 = 900,000J = 900kJ"},
  {q:"The fuse wire melts due to:",o:["Magnetic effect","Chemical effect","Heating effect","Mechanical effect","Optical effect"],a:2,e:"Excessive current generates heat (I²R) melting the wire"},
  {q:"Which appliance uses the heating effect of current?",o:["Electric fan","Electric bell","Electric kettle","Dynamo","Motor"],a:2,e:"Kettle converts electrical energy to heat energy"},
  
  // Section E: Electrical Wiring of Houses (41-50)
  {q:"In homes, electrical appliances and lamps are connected in parallel because:",o:["Less voltage will be used","Parallel connection does not heat up the wires","Series connection uses high voltage","Less current will be used","Independent operation"],a:1,e:"Parallel ensures each gets full voltage and operates independently"},
  {q:"The colour code for live wire in modern domestic wiring is:",o:["Red","Brown","Blue","Green/Yellow","Black"],a:1,e:"Brown (old code was Red)"},
  {q:"The earth wire is coloured:",o:["Red","Black","Green/Yellow","Blue","Green"],a:2,e:"Green and Yellow stripes"},
  {q:"Switches should be connected to the:",o:["Neutral wire","Earth wire","Live wire","Any wire","Both live and neutral"],a:2,e:"For safety, switches break the live wire to stop current flow"},
  {q:"Three 60W bulbs connected in parallel to 240V. Calculate total current.",o:["0.25A","0.75A","1.5A","2.25A","1.0A"],a:1,e:"Each draws 60/240 = 0.25A; Total = 3 × 0.25 = 0.75A"},
  {q:"If these bulbs were in series, total power would be:",o:["180W","60W","20W","240W","30W"],a:2,e:"Each gets 80V (240/3); P = V²/R = 80²/960 = 6.67W each; Total = 20W (or simply: 1/3 voltage → 1/9 power each × 3 = 1/3 total = 60/3 = 20W)"},
  {q:"The main fuse in a house is rated at:",o:["3A","5A","30-60A","1A","100A"],a:2,e:"Main fuse/cartridge handles total house load (30A-60A typical)"},
  {q:"Why are houses wired in parallel?",o:["To reduce electricity bills","Independent operation of appliances","To increase resistance","To decrease voltage","To increase current"],a:1,e:"Each appliance operates independently at full voltage"},
  {q:"Calculate total resistance of three 60W, 240V bulbs in parallel.",o:["320Ω","960Ω","2880Ω","106.7Ω","1920Ω"],a:0,e:"Each R = 240²/60 = 960Ω; 1/R_total = 3/960; R_total = 320Ω"},
  {q:"A short circuit occurs when:",o:["Live and neutral touch directly","Live and earth touch","Switch is off","Fuse blows","Neutral and earth touch"],a:0,e:"Direct contact between live and neutral with minimal resistance"},
  
  // Section F: Use of Fuses (51-60)
  {q:"The fuse in an electric device is always connected to the:",o:["Neutral side","Earth side","Live side","Terminal side","Load side"],a:2,e:"Fuse must be on live wire to break circuit completely"},
  {q:"An appliance rated 2000W, 250V needs a fuse of rating:",o:["3A","5A","10A","13A","15A"],a:2,e:"I = 2000/250 = 8A; Use next standard: 10A"},
  {q:"A 3kW electric cooker at 240V requires a fuse rated at least:",o:["5A","10A","13A","30A","15A"],a:2,e:"I = 3000/240 = 12.5A; Use 13A fuse"},
  {q:"Why should you NOT use a 30A fuse for a 5A appliance?",o:["It won't fit","It won't protect against overcurrent","It will reduce voltage","It will increase power","It will melt"],a:1,e:"Fuse won't blow until current exceeds 30A, allowing appliance damage/fire"},
  {q:"Calculate the appropriate fuse for five 100W bulbs at 240V.",o:["2A","3A","5A","13A","10A"],a:2,e:"Total P = 500W; I = 500/240 = 2.08A; Use 3A or 5A (5A safer for startup surge)"},
  {q:"A fuse wire should have:",o:["High melting point, low resistance","Low melting point, high resistance","Low melting point, low resistance","High melting point, high resistance","Medium melting point"],a:1,e:"Low melting to break circuit quickly; high resistance to generate heat"},
  {q:"When a fuse blows, you should:",o:["Replace with higher rating","Replace with same rating","Bypass with wire","Use aluminium foil","Ignore it"],a:1,e:"Always use same rating for safety"},
  {q:"A 240V circuit has 2kW heater and 1kW iron. Minimum fuse rating:",o:["10A","13A","15A","30A","20A"],a:1,e:"Total = 3kW; I = 3000/240 = 12.5A; Use 13A"},
  {q:"The function of a fuse is to:",o:["Increase voltage","Protect against excessive current","Store electricity","Reduce resistance","Increase current"],a:1,e:"Safety device against overcurrent"},
  {q:"A circuit breaker differs from a fuse because it:",o:["Works on lower voltage","Can be reset after tripping","Is cheaper","Has higher resistance","Is slower"],a:1,e:"Circuit breakers are resettable; fuses must be replaced"}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('electrical_energy_power_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('electrical_energy_power_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/60`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('electrical_energy_power_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=38?'Good, review weak areas':pct>=30?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,10,20,30,40,50,60];
  const sectionNames=["A: Concepts of Energy & Power","B: Commercial Units (kWh)","C: Electric Power Transmission","D: Heating Effects of Current","E: Electrical Wiring of Houses","F: Use of Fuses"];
  
  for(let s=0;s<6;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('electrical_energy_power_quiz_auth');
  sessionStorage.removeItem('electrical_energy_power_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('electrical_energy_power_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('electrical_energy_power_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
