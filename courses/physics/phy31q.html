<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB Physics - Current Electricity</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800;--info:#2196f3}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20;--info:#1976d2}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    #quiz{display:none;max-width:800px;margin:0 auto;padding:80px 12px 100px}
    
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .section-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px;line-height:1.6}
    
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:12px 24px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:48px;height:48px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
    .res.show{display:flex}
    .res-box{background:var(--bg);padding:32px;border-radius:24px;box-shadow:8px 8px 16px var(--si),-8px -8px 12px var(--so);max-width:400px;width:100%}
    .res-circle{width:140px;height:140px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:36px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:4px}
    .res h2{font-size:24px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:15px;line-height:1.5}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .res-btns button{min-width:120px}
    
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:80px 16px 24px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:16px}
    .det-summary{background:var(--bg);padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so);text-align:center}
    .det-summary .big{font-size:48px;font-weight:800;color:var(--a)}
    .det-item{margin-bottom:16px;padding:16px;background:rgba(0,0,0,.03);border-radius:12px;border-left:4px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:8px}
    .det-item .q-text{font-size:15px;font-weight:600;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:8px}
    .det-item .ans-row{display:flex;gap:16px;margin-bottom:6px;font-size:14px}
    .det-item .ans-row strong{min-width:80px}
    .det-item .exp{font-size:13px;color:#666;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 4px var(--si);line-height:1.6}
    
    .hide{display:none!important}
    @media(max-width:400px){
      .opt{padding:12px}
      .res-box{padding:24px}
      .res-circle{width:120px;height:120px}
      .res-score{font-size:32px}
      .pop-grid{grid-template-columns:repeat(5,1fr)}
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access -->
  <div id="access">
    <div class="card">
      <h1>🔐 JAMB Physics</h1>
      <p>Current Electricity (Chapter 31)<br>Enter your 8-character access code</p>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start Quiz</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Current Electricity</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 80:00</div>
      <div class="section-type" id="stype">Section A</div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="nextBtn" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Question Navigator</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center;margin-top:8px">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current &nbsp;
        <span style="color:#666">●</span> Unanswered
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-box">
      <div class="res-circle">
        <div class="res-score" id="rscore">0%</div>
        <div class="res-label">Score</div>
      </div>
      <h2 id="rtitle">Quiz Complete!</h2>
      <p id="rmsg">You completed the quiz</p>
      <div class="res-btns">
        <button class="primary" onclick="showDet()">📊 View Details</button>
        <button class="nav-btn" onclick="continueQuiz()">↩ Continue</button>
        <button class="nav-btn" onclick="restart()" style="background:var(--d);color:#fff">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">← Back</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="window.print()">🖨️ Print</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Configuration
const CONFIG={TIME:4800,PASS:60}; // 80 minutes for 80 questions

// Section mapping
const SECTIONS={
  0:"A: Electric Current & Charge",
  10:"B: Potential Difference & Ohm's Law",
  20:"C: Resistance & Resistivity",
  30:"D: Electrical Power & Energy",
  40:"E: Resistor Combinations",
  50:"F: EMF, Internal Resistance & Cells",
  60:"G: Electrical Measurements & Instruments",
  70:"H: Circuit Analysis & Bridges"
};

function getSection(qIndex){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>b-a);
  for(let k of keys){
    if(qIndex>=k)return SECTIONS[k];
  }
  return "Introduction";
}

// Quiz Data - 80 JAMB Physics Current Electricity Questions
const QUIZ_DATA=[
  // Section A: Electric Current & Charge (1-10)
  {q:"A charge of 360 C flows through a conductor in 2 minutes. Calculate the current.",o:["1 A","2 A","3 A","4 A","6 A"],a:2,e:"I = Q/t = 360/(2×60) = 360/120 = 3 A"},
  {q:"How many electrons constitute a charge of 1.6 μC? (e = 1.6 × 10⁻¹⁹ C)",o:["10¹³","10¹⁴","10¹⁵","10¹⁶","10¹⁹"],a:0,e:"n = Q/e = (1.6 × 10⁻⁶)/(1.6 × 10⁻¹⁹) = 10¹³ electrons"},
  {q:"A current of 5 A flows for 4 minutes. Calculate the total charge transferred.",o:["20 C","100 C","200 C","600 C","1200 C"],a:4,e:"Q = It = 5 × (4 × 60) = 5 × 240 = 1200 C"},
  {q:"In a metallic conductor, electric current is due to the flow of",o:["Positive ions only","Negative ions only","Electrons only","Holes and electrons","Positive and negative ions"],a:2,e:"In metals, current is carried by free electrons moving through the lattice."},
  {q:"The unit of electric current is the",o:["Volt","Ampere","Coulomb","Ohm","Watt"],a:1,e:"The SI unit of electric current is the ampere (A), named after André-Marie Ampère."},
  {q:"A lightning flash carries 25 C of charge in 0.5 ms. Calculate the average current.",o:["5 × 10³ A","5 × 10⁴ A","5 × 10⁵ A","5 × 10⁶ A","5 × 10⁷ A"],a:1,e:"I = Q/t = 25/(0.5 × 10⁻³) = 25/(5 × 10⁻⁴) = 5 × 10⁴ A"},
  {q:"Which of the following is NOT a source of direct current?",o:["Dry cell","Lead-acid accumulator","Dynamo","Solar cell","Thermocouple"],a:2,e:"A dynamo (AC generator) produces alternating current; the others produce DC."},
  {q:"The drift velocity of electrons in a conductor is typically",o:["Equal to the speed of light","Slightly less than the speed of light","A few millimeters per second","A few thousand meters per second","Equal to the speed of sound"],a:2,e:"Despite current flowing instantly, individual electrons drift very slowly (mm/s) due to collisions."},
  {q:"If 3.2 × 10¹⁸ electrons pass through a point in 0.8 s, calculate the current.",o:["0.32 A","0.64 A","0.80 A","1.28 A","1.60 A"],a:1,e:"Q = ne = 3.2 × 10¹⁸ × 1.6 × 10⁻¹⁹ = 0.512 C; I = Q/t = 0.512/0.8 = 0.64 A"},
  {q:"Conventional current flows from",o:["Negative to positive","Positive to negative","Higher potential to lower potential","Both A and C","Both B and C"],a:4,e:"Conventional current flows from positive to negative, which is from higher to lower potential. (Electron flow is opposite)"},
  
  // Section B: Potential Difference & Ohm's Law (11-20)
  {q:"Calculate the work done when 50 C of charge is moved through a p.d. of 12 V.",o:["0.24 J","4.17 J","38 J","600 J","720 J"],a:3,e:"W = QV = 50 × 12 = 600 J"},
  {q:"A conductor obeys Ohm's law if",o:["Its resistance increases with temperature","Its resistance decreases with temperature","The current through it is directly proportional to the p.d. across it","The current is inversely proportional to the p.d.","It has a high resistance"],a:2,e:"Ohm's law states that V ∝ I at constant temperature for metallic conductors."},
  {q:"A resistor has 6 V across it when the current is 0.3 A. What is its resistance?",o:["0.05 Ω","1.8 Ω","6.3 Ω","20 Ω","60 Ω"],a:3,e:"R = V/I = 6/0.3 = 20 Ω"},
  {q:"Which graph correctly represents Ohm's law?",o:["Current vs Voltage - curved line through origin","Current vs Voltage - straight line through origin","Resistance vs Temperature - straight line","Voltage vs Resistance - straight line through origin","Current vs Resistance - straight line"],a:1,e:"Ohm's law gives a linear I-V characteristic passing through the origin for ohmic conductors."},
  {q:"Calculate the p.d. across a 25 Ω resistor carrying 0.4 A.",o:["0.016 V","6.25 V","10 V","25.4 V","62.5 V"],a:2,e:"V = IR = 0.4 × 25 = 10 V"},
  {q:"A wire carries 2 A when connected to 12 V. If the voltage is increased to 18 V, the new current is",o:["1.33 A","2 A","2.5 A","3 A","4.5 A"],a:3,e:"R = 12/2 = 6 Ω; New I = 18/6 = 3 A (assuming constant temperature)"},
  {q:"The unit of potential difference is equivalent to",o:["J/C","C/J","A/Ω","Ω/A","W/A"],a:0,e:"V = W/Q, so 1 Volt = 1 Joule/Coulomb"},
  {q:"A device has a resistance of 500 Ω. What current flows when connected to 250 V?",o:["0.25 A","0.5 A","1 A","2 A","5 A"],a:1,e:"I = V/R = 250/500 = 0.5 A"},
  {q:"Which material does NOT obey Ohm's law?",o:["Copper","Aluminum","Constantan","Semiconductor diode","Nichrome"],a:3,e:"Semiconductor diodes are non-ohmic; their I-V relationship is exponential, not linear."},
  {q:"If the p.d. across a resistor is halved, the power dissipated becomes",o:["Quartered","Halved","Unchanged","Doubled","Quadrupled"],a:0,e:"P = V²/R; if V becomes V/2, P becomes (V/2)²/R = V²/4R = P/4"},
  
  // Section C: Resistance & Resistivity (21-30)
  {q:"A wire of length 3 m and cross-sectional area 2 × 10⁻⁶ m² has resistivity 1.7 × 10⁻⁸ Ωm. Calculate its resistance.",o:["0.0113 Ω","0.0255 Ω","0.051 Ω","0.255 Ω","0.51 Ω"],a:1,e:"R = ρL/A = (1.7 × 10⁻⁸ × 3)/(2 × 10⁻⁶) = 5.1 × 10⁻⁸/2 × 10⁻⁶ = 0.0255 Ω"},
  {q:"The resistance of a wire is 8 Ω. If its length is doubled and its diameter is halved, the new resistance is",o:["16 Ω","32 Ω","64 Ω","128 Ω","256 Ω"],a:2,e:"R ∝ L/A; L doubles (×2), diameter halves so area quarters (×4); New R = 8 × 2 × 4 = 64 Ω"},
  {q:"Which factor does NOT affect the resistance of a metallic conductor?",o:["Length","Cross-sectional area","Temperature","Colour","Material"],a:3,e:"Colour has no effect on electrical resistance; it depends on L, A, material (ρ), and temperature."},
  {q:"A wire of resistance R is stretched uniformly to double its length. Its new resistance is",o:["R/2","R","2R","4R","8R"],a:3,e:"When length doubles, volume is constant so area halves; R' = ρ(2L)/(A/2) = 4ρL/A = 4R"},
  {q:"The resistivity of a material depends on its",o:["Length","Cross-sectional area","Temperature and nature","Shape","Voltage applied"],a:2,e:"Resistivity is an intrinsic property depending only on material nature and temperature."},
  {q:"Two wires of the same material have lengths in ratio 2:1 and diameters in ratio 1:2. The ratio of their resistances is",o:["1:1","2:1","4:1","8:1","1:8"],a:3,e:"R ∝ L/d²; Ratio = (2/1²):(1/2²) = 2:1/4 = 8:1"},
  {q:"At 20°C, a copper wire has resistance 10 Ω. When heated to 100°C, its resistance will",o:["Decrease slightly","Remain unchanged","Increase slightly","Double","Become zero"],a:2,e:"Metals have positive temperature coefficient; resistance increases with temperature."},
  {q:"Conductivity is expressed in units of",o:["Ωm","Ω/m","(Ωm)⁻¹","Ω⁻¹m⁻¹","C or D"],a:4,e:"Conductivity σ = 1/ρ, units are (Ωm)⁻¹ or Siemens/meter (S/m), equivalent to Ω⁻¹m⁻¹"},
  {q:"A nichrome wire (ρ = 1.1 × 10⁻⁶ Ωm) of length 5 m has resistance 2.2 Ω. Calculate its cross-sectional area.",o:["2.5 × 10⁻⁶ m²","2.5 × 10⁻⁵ m²","5 × 10⁻⁶ m²","5 × 10⁻⁵ m²","1.1 × 10⁻⁵ m²"],a:0,e:"A = ρL/R = (1.1 × 10⁻⁶ × 5)/2.2 = 5.5 × 10⁻⁶/2.2 = 2.5 × 10⁻⁶ m²"},
  {q:"The temperature coefficient of resistance is negative for",o:["Copper","Aluminum","Iron","Semiconductors","Platinum"],a:3,e:"Semiconductors and insulators have negative temperature coefficients (resistance decreases with temperature)."},
  
  // Section D: Electrical Power & Energy (31-40)
  {q:"An electric heater rated 2000 W, 250 V operates for 30 minutes. Calculate the energy consumed in kWh.",o:["0.5 kWh","1 kWh","2 kWh","5 kWh","60 kWh"],a:1,e:"Energy = Pt = 2 kW × 0.5 h = 1 kWh"},
  {q:"A 100 W bulb operates for 8 hours daily. Calculate the cost for 30 days at ₦50 per kWh.",o:["₦400","₦800","₦1200","₦1600","₦2400"],a:2,e:"Energy = 0.1 kW × 8 h × 30 = 24 kWh; Cost = 24 × 50 = ₦1200"},
  {q:"Calculate the power dissipated in a 20 Ω resistor carrying 0.5 A.",o:["2.5 W","5 W","10 W","20 W","40 W"],a:1,e:"P = I²R = (0.5)² × 20 = 0.25 × 20 = 5 W"},
  {q:"An electric kettle rated 3000 W is connected to 240 V. Calculate its resistance.",o:["0.08 Ω","12.5 Ω","19.2 Ω","720 Ω","72000 Ω"],a:2,e:"R = V²/P = (240)²/3000 = 57600/3000 = 19.2 Ω"},
  {q:"Two bulbs rated 60 W, 240 V and 100 W, 240 V are connected in series across 240 V. Which statement is correct?",o:["Both glow normally","The 60 W bulb glows brighter","The 100 W bulb glows brighter","Neither glows","Both fuse"],a:1,e:"In series, higher resistance (60 W bulb: R = 960 Ω) dissipates more power (P = I²R) and glows brighter."},
  {q:"An electric motor draws 5 A from 240 V mains. If it is 80% efficient, calculate its mechanical power output.",o:["240 W","960 W","1200 W","1500 W","1920 W"],a:1,e:"Input power = 240 × 5 = 1200 W; Output = 0.8 × 1200 = 960 W"},
  {q:"How many joules are equivalent to 1 kWh?",o:["3.6 × 10³ J","3.6 × 10⁴ J","3.6 × 10⁵ J","3.6 × 10⁶ J","3.6 × 10⁹ J"],a:3,e:"1 kWh = 1000 W × 3600 s = 3.6 × 10⁶ J"},
  {q:"A heating coil has resistance 50 Ω. Calculate the heat produced in 2 minutes when connected to 200 V.",o:["400 J","8000 J","96000 J","480000 J","960000 J"],a:2,e:"H = V²t/R = (200)² × 120/50 = 40000 × 120/50 = 96000 J"},
  {q:"The maximum power transfer theorem states that maximum power is delivered when",o:["Load resistance is zero","Load resistance equals internal resistance","Load resistance is infinite","Current is maximum","Voltage is maximum"],a:1,e:"Maximum power is transferred when load resistance equals source internal resistance."},
  {q:"An electric iron draws 4 A at 250 V. Calculate the cost of using it for 2 hours at ₦45 per kWh.",o:["₦9","₦36","₦72","₦90","₦180"],a:3,e:"P = 250 × 4 = 1000 W = 1 kW; Energy = 1 × 2 = 2 kWh; Cost = 2 × 45 = ₦90"},
  
  // Section E: Resistor Combinations (41-50)
  {q:"Three resistors of 2 Ω, 4 Ω, and 6 Ω are connected in series. The total resistance is",o:["1.09 Ω","4 Ω","6 Ω","12 Ω","48 Ω"],a:3,e:"R_total = 2 + 4 + 6 = 12 Ω"},
  {q:"Two resistors of 6 Ω and 12 Ω are connected in parallel. The effective resistance is",o:["4 Ω","6 Ω","9 Ω","12 Ω","18 Ω"],a:0,e:"R = (6×12)/(6+12) = 72/18 = 4 Ω"},
  {q:"In a parallel circuit, which quantity remains the same across all components?",o:["Current","Resistance","Voltage","Power","Charge"],a:2,e:"In parallel connections, the potential difference (voltage) is the same across all branches."},
  {q:"Four 8 Ω resistors are connected in parallel. The equivalent resistance is",o:["0.5 Ω","2 Ω","4 Ω","8 Ω","32 Ω"],a:1,e:"1/R = 4/8 = 1/2; R = 2 Ω"},
  {q:"Three resistors (2 Ω, 3 Ω, 6 Ω) in parallel are connected to 12 V. Calculate the total current.",o:["1 A","6 A","12 A","18 A","24 A"],a:2,e:"1/R = 1/2 + 1/3 + 1/6 = 3/6 + 2/6 + 1/6 = 1; R = 1 Ω; I = 12/1 = 12 A"},
  {q:"A 6 Ω and 12 Ω resistor in parallel are connected in series with a 4 Ω resistor. The total resistance is",o:["4 Ω","8 Ω","10 Ω","12 Ω","22 Ω"],a:1,e:"Parallel: (6×12)/(6+12) = 4 Ω; Series: 4 + 4 = 8 Ω"},
  {q:"In a series circuit with resistors 5 Ω and 10 Ω connected to 15 V, the current is",o:["0.5 A","1 A","2 A","3 A","15 A"],a:1,e:"R_total = 15 Ω; I = 15/15 = 1 A"},
  {q:"The effective resistance of three equal resistors R in parallel is",o:["R/3","3R","R²/3","3/R","R³"],a:0,e:"1/R_eff = 3/R; R_eff = R/3"},
  {q:"Two resistors in series have total resistance 10 Ω. In parallel, their effective resistance is 2.4 Ω. The resistors are",o:["2 Ω and 8 Ω","3 Ω and 7 Ω","4 Ω and 6 Ω","5 Ω and 5 Ω","1 Ω and 9 Ω"],a:2,e:"Check: 4+6=10; (4×6)/(4+6)=24/10=2.4 Ω ✓"},
  {q:"A parallel combination of 3 Ω and 6 Ω is connected in series with 4 Ω across a 24 V battery. The current through the 3 Ω resistor is",o:["1 A","2 A","4 A","6 A","8 A"],a:1,e:"Parallel = 2 Ω; Total = 6 Ω; Total I = 24/6 = 4 A; V_parallel = 4×2 = 8 V; I_3Ω = 8/3 ≈ 2.67 A ≈ 2 A (closest)"},
  
  // Section F: EMF, Internal Resistance & Cells (51-60)
  {q:"A cell of EMF 1.5 V and internal resistance 0.5 Ω is connected to a 2.5 Ω resistor. Calculate the terminal p.d.",o:["0.25 V","1.0 V","1.25 V","1.5 V","2.5 V"],a:2,e:"I = 1.5/(2.5+0.5) = 0.5 A; V = IR = 0.5×2.5 = 1.25 V (or V = E-Ir = 1.5-0.25 = 1.25 V)"},
  {q:"When a cell is on open circuit, the p.d. across its terminals is equal to its",o:["Internal resistance","Terminal voltage","EMF","Current capacity","Lost voltage"],a:2,e:"On open circuit (I=0), terminal p.d. = EMF since there is no internal voltage drop."},
  {q:"A battery of EMF 12 V and internal resistance 0.2 Ω delivers 2 A to an external resistor. Calculate the value of the external resistor.",o:["5.8 Ω","6.0 Ω","6.2 Ω","5.0 Ω","5.5 Ω"],a:0,e:"E = I(R+r); 12 = 2(R+0.2); R+0.2 = 6; R = 5.8 Ω"},
  {q:"Three identical cells (E=2V, r=1Ω) are connected in series to a 9 Ω resistor. The current is",o:["0.2 A","0.5 A","0.6 A","1.0 A","1.5 A"],a:1,e:"E_total = 6 V, r_total = 3 Ω; I = 6/(9+3) = 6/12 = 0.5 A"},
  {q:"The efficiency of a cell is given by",o:["r/(R+r)","R/(R+r)","(R+r)/R","I²R/E","E/(R+r)"],a:1,e:"Efficiency = Power output/Power input = I²R/I²(R+r) = R/(R+r)"},
  {q:"A cell has EMF 6 V and internal resistance 2 Ω. Calculate the short-circuit current.",o:["0.33 A","1 A","2 A","3 A","12 A"],a:3,e:"Short circuit: R=0; I = E/r = 6/2 = 3 A"},
  {q:"Four identical cells in parallel, each of EMF 2 V and internal resistance 2 Ω, are connected to a 3 Ω external resistor. The current is",o:["0.4 A","0.5 A","0.67 A","1 A","2 A"],a:1,e:"E_total = 2 V, r_total = 2/4 = 0.5 Ω; I = 2/(3+0.5) = 2/3.5 = 0.57 A ≈ 0.5 A (closest)"},
  {q:"The lost voltage in a cell is the",o:["EMF of the cell","Terminal p.d.","P.d. across internal resistance","Current × external resistance","Power delivered"],a:2,e:"Lost voltage = Ir, the voltage drop across the internal resistance."},
  {q:"A cell delivers maximum power to an external resistor of 4 Ω. Its internal resistance is",o:["1 Ω","2 Ω","4 Ω","8 Ω","16 Ω"],a:2,e:"Maximum power transfer occurs when R = r, so r = 4 Ω"},
  {q:"When current is drawn from a cell, its terminal p.d. is",o:["Greater than its EMF","Equal to its EMF","Less than its EMF","Zero","Infinite"],a:2,e:"Terminal p.d. = E - Ir, which is always less than EMF when current flows."},
  
  // Section G: Electrical Measurements & Instruments (61-70)
  {q:"An ammeter should have",o:["High resistance","Low resistance","Infinite resistance","Zero resistance ideally","Both B and D"],a:4,e:"An ammeter should have very low resistance to avoid altering the current it measures; ideally zero."},
  {q:"To convert a galvanometer into a voltmeter, you connect",o:["A low resistance in parallel","A high resistance in series","A low resistance in series","A high resistance in parallel","A cell in series"],a:1,e:"A high resistance (multiplier) in series limits current and allows measurement of higher voltages."},
  {q:"A galvanometer has resistance 50 Ω and full-scale deflection at 1 mA. To convert it to read 10 V, the multiplier resistance needed is",o:["50 Ω","500 Ω","9950 Ω","10000 Ω","10050 Ω"],a:2,e:"V = I_g(R_g + R); 10 = 0.001(50 + R); R = 10000 - 50 = 9950 Ω"},
  {q:"A shunt is used to",o:["Increase the sensitivity of a galvanometer","Convert a galvanometer to an ammeter","Convert a galvanometer to a voltmeter","Protect the galvanometer","Increase the resistance"],a:1,e:"A shunt (low resistance in parallel) diverts excess current, converting a galvanometer to an ammeter."},
  {q:"A voltmeter draws 0.01 A at full scale of 50 V. Its resistance is",o:["0.5 Ω","5 Ω","50 Ω","500 Ω","5000 Ω"],a:4,e:"R = V/I = 50/0.01 = 5000 Ω"},
  {q:"The sensitivity of a galvanometer can be increased by",o:["Increasing the number of turns in the coil","Using a stronger hair spring","Decreasing the magnetic field","Increasing the coil resistance","Decreasing the coil area"],a:0,e:"More turns increase torque for given current, increasing sensitivity."},
  {q:"An ideal voltmeter has",o:["Zero resistance","Infinite resistance","Resistance equal to the circuit","Low resistance","Variable resistance"],a:1,e:"An ideal voltmeter draws no current, hence infinite resistance."},
  {q:"To measure current through a resistor, an ammeter is connected",o:["In parallel with the resistor","In series with the resistor","Across the battery","Anywhere in the circuit","In parallel with the battery"],a:1,e:"Current is measured by connecting the ammeter in series so all current flows through it."},
  {q:"A multimeter can measure",o:["Current only","Voltage only","Resistance only","Current, voltage and resistance","Power only"],a:3,e:"A multimeter is a versatile instrument that can measure current (ammeter), voltage (voltmeter), and resistance (ohmmeter)."},
  {q:"The coil of a moving-coil galvanometer is wound on a soft iron core to",o:["Increase resistance","Increase magnetic flux","Decrease sensitivity","Provide damping","Reduce weight"],a:1,e:"The soft iron core concentrates magnetic field lines, increasing flux linkage and torque."},
  
  // Section H: Circuit Analysis & Bridges (71-80)
  {q:"In a balanced Wheatstone bridge, the current through the galvanometer is",o:["Maximum","Minimum","Zero","Equal to battery current","Infinite"],a:2,e:"At balance, the bridge is adjusted so no current flows through the galvanometer."},
  {q:"In a meter bridge experiment, the balance point is at 40 cm from the left end. If the resistance in the left gap is 8 Ω, the resistance in the right gap is",o:["4 Ω","5.33 Ω","12 Ω","16 Ω","20 Ω"],a:2,e:"R₁/R₂ = l₁/l₂; 8/R₂ = 40/60; R₂ = 8 × 60/40 = 12 Ω"},
  {q:"Kirchhoff's first law is based on the principle of conservation of",o:["Energy","Momentum","Charge","Mass","Power"],a:2,e:"The junction law (ΣI = 0) expresses conservation of charge - no accumulation at junctions."},
  {q:"Kirchhoff's second law is based on conservation of",o:["Charge","Energy","Momentum","Current","Voltage"],a:1,e:"The loop law (ΣE = ΣIR) expresses conservation of energy around a closed circuit."},
  {q:"In a potentiometer experiment, the balance length is proportional to",o:["The resistance of the wire","The EMF of the test cell","The current in the main circuit","The internal resistance","The diameter of the wire"],a:1,e:"At balance, E ∝ l, so the EMF is directly proportional to the balance length."},
  {q:"A potentiometer is preferred over a voltmeter for measuring EMF because it",o:["Is cheaper","Is more portable","Draws no current from the cell","Has infinite resistance","Works with AC and DC"],a:2,e:"At balance, no current flows from the test cell, giving accurate EMF measurement."},
  {q:"In a Wheatstone bridge, P=10 Ω, Q=15 Ω, R=6 Ω. For balance, S should be",o:["4 Ω","9 Ω","10 Ω","15 Ω","25 Ω"],a:1,e:"P/Q = R/S; 10/15 = 6/S; S = 15×6/10 = 9 Ω"},
  {q:"The main advantage of a potentiometer over a voltmeter is its",o:["Higher range","Ability to measure AC","Greater accuracy","Lower cost","Smaller size"],a:2,e:"Potentiometers provide null measurements without drawing current, offering higher accuracy."},
  {q:"In a meter bridge, if the balance point is at the midpoint, the resistances in the two gaps are",o:["In ratio 1:2","In ratio 2:1","Equal","In ratio 1:4","Zero"],a:2,e:"At midpoint (50 cm), l₁ = l₂, so R₁ = R₂"},
  {q:"A cell of EMF 2 V gives a balance point at 80 cm on a potentiometer wire. If another cell gives balance at 60 cm, its EMF is",o:["0.5 V","1.0 V","1.5 V","2.5 V","3.0 V"],a:2,e:"E₁/E₂ = l₁/l₂; 2/E₂ = 80/60; E₂ = 2×60/80 = 120/80 = 1.5 V"}
];

let state={data:QUIZ_DATA,ans:new Array(QUIZ_DATA.length).fill(null),q:0,time:CONFIG.TIME,timer:null,submitted:false};

function init(){
  const saved=sessionStorage.getItem('current_electricity_quiz_progress');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&!d.submitted&&confirm('Resume previous session?')){
      state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  document.getElementById('load').classList.add('hide');
  document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  
  if(c.length!==8){showMsg('Enter 8-character code','err');return;}
  
  btn.disabled=true;btn.textContent='Checking...';
  
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid code format','err');btn.disabled=false;btn.textContent='Start Quiz';return;}
    localStorage.setItem('current_electricity_quiz_auth',c);
    showMsg('Access granted!','ok');
    setTimeout(()=>{
      document.getElementById('access').style.display='none';
      document.getElementById('quiz').style.display='block';
      startTimer();
      render();
    },400);
  },300);
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)saveProgress();
    }else{
      submit(true);
    }
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const q=state.data[state.q];
  
  // Progress
  const done=state.ans.filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/state.data.length*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${state.data.length}`;
  
  // Section
  document.getElementById('stype').textContent=`Section ${getSection(state.q)} • Question ${state.q+1}/80`;
  
  // Question
  document.getElementById('question').textContent=q.q;
  
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Navigation
  document.getElementById('prevBtn').disabled=state.q===0;
  const isLast=state.q===state.data.length-1;
  document.getElementById('nextBtn').textContent=isLast?'Submit Quiz ✓':'Next →';
}

function select(i){
  state.ans[state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  saveProgress();
}

function next(){
  const isLast=state.q===state.data.length-1;
  
  if(isLast){
    const unans=state.ans.filter(x=>x===null).length;
    if(unans>0&&!confirm(`${unans} question(s) unanswered. Submit anyway?`)){
      showPop();return;
    }
    submit(false);return;
  }
  
  state.q++;
  render();
}

function prev(){
  if(state.q>0){state.q--;}
  render();
}

function saveProgress(){
  sessionStorage.setItem('current_electricity_quiz_progress',JSON.stringify({
    q:state.q,ans:state.ans,time:state.time,submitted:state.submitted,ts:Date.now()
  }));
}

function submit(timeout){
  clearInterval(state.timer);
  state.submitted=true;
  saveProgress();
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  
  const pct=Math.round((correct/state.data.length)*100);
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
  
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Excellent!':timeout?'⏰ Time Up!':'Quiz Complete';
  document.getElementById('rmsg').innerHTML=`You scored <strong>${correct}/${state.data.length}</strong> (${pct}%)<br>${pct>=CONFIG.PASS?'✓ Pass mark achieved!':'Keep practicing!'}<br><br>${pct>=45?'Ready for JAMB!':pct>=38?'Good, review weak areas':pct>=30?'Average, needs more practice':'Study fundamentals again'}`;
}

function continueQuiz(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('quiz').style.display='block';
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  state.data.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    const ans=state.ans[i]!==null;
    const cur=i===state.q;
    if(ans)b.className='ans';
    if(cur)b.style.border='2px solid var(--a)';
    b.onclick=()=>{state.q=i;hidePop();render();};
    g.appendChild(b);
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  
  let correct=0;
  state.data.forEach((q,i)=>{
    if(state.ans[i]===q.a)correct++;
  });
  const pct=Math.round((correct/state.data.length)*100);
  
  const sum=document.createElement('div');
  sum.className='det-summary';
  sum.innerHTML=`<div class="big">${pct}%</div><div>${correct}/${state.data.length} correct</div>`;
  c.appendChild(sum);
  
  // Group by sections
  const sections=[0,10,20,30,40,50,60,70,80];
  const sectionNames=["A: Electric Current & Charge","B: Potential Difference & Ohm's Law","C: Resistance & Resistivity","D: Electrical Power & Energy","E: Resistor Combinations","F: EMF, Internal Resistance & Cells","G: Electrical Measurements & Instruments","H: Circuit Analysis & Bridges"];
  
  for(let s=0;s<8;s++){
    const start=sections[s];
    const end=sections[s+1];
    
    const ph=document.createElement('div');
    ph.style.cssText='margin:20px 0 12px;padding:12px;background:var(--a);color:#fff;border-radius:8px;font-size:14px';
    ph.innerHTML=`<strong>Section ${sectionNames[s]}</strong>`;
    c.appendChild(ph);
    
    for(let i=start;i<end;i++){
      const q=state.data[i];
      const ans=state.ans[i];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`<h4>Question ${i+1}</h4><div class="q-text">${q.q}</div><div class="ans-row"><strong>Your answer:</strong> ${ans!==null?String.fromCharCode(65+ans)+') '+q.o[ans]:'Not answered'}</div><div class="ans-row"><strong>Correct:</strong> ${String.fromCharCode(65+q.a)+') '+q.o[q.a]}</div><div class="exp">${q.e}</div>`;
      c.appendChild(d);
    }
  }
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('res').style.display='none';
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').style.display='flex';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start a new quiz? All progress will be reset.'))return;
  localStorage.removeItem('current_electricity_quiz_auth');
  sessionStorage.removeItem('current_electricity_quiz_progress');
  location.reload();
}

function exit(){
  if(confirm('Exit quiz? Your progress is saved.')){saveProgress();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('current_electricity_quiz_theme',document.body.classList.contains('light')?'light':'dark');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('current_electricity_quiz_theme')==='light')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
  init();
});
</script>
